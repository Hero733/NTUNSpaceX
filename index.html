<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองที่นั่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        .map-area {
            position: relative;
            width: 100%;
            height: 70vh;
            overflow: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #roomCanvas {
            position: relative;
            width: 1500px;
            height: 1500px;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Desk Styles */
        .desk {
            position: absolute;
            width: 70px;
            height: 85px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .desk.dragging {
            z-index: 50;
            opacity: 0.8;
            cursor: grabbing !important;
            transform: scale(1.05);
        }
        .desk-chair { fill: #4a5568; }
        .desk-top { fill: #e2e8f0; transition: fill 0.3s; }
        .desk-line { stroke: #a0aec0; stroke-width: 2; }
        
        .desk.booked .desk-top { fill: #f56565; } /* สีแดง (ถูกจอง) */
        .desk.my-seat .desk-top { fill: #48bb78; } /* สีเขียว (ที่นั่งของเรา) */
        
        .desk-label {
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #1a202c;
            font-weight: 900;
            font-size: 14px;
            pointer-events: none;
        }
        .desk-tooltip {
            display: none;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 100;
        }
        .desk:hover .desk-tooltip { display: block; }
    </style>
</head>
<body class="text-white">

    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                <i class='bx bxs-graduation text-2xl'></i>
            </div>
            <h1 class="text-xl font-black tracking-wider">SEAT<span class="text-[#5AB2FF]">BOOKING</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="userInfo" class="hidden md:flex flex-col items-end">
                <span id="userName" class="font-bold text-sm">กำลังโหลด...</span>
                <span id="userRole" class="text-xs text-white/60 uppercase"></span>
            </div>
            <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500/40 text-red-300 px-4 py-2 rounded-full text-sm font-bold transition-colors">
                ออกจากระบบ
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6" id="contentArea">
        </main>

    <script>
        // ==========================================
        // 1. ตั้งค่า Firebase (กรุณาใส่ Config ของคุณ)
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ==========================================
        // 2. ตัวแปร Global
        // ==========================================
        let currentUser = null;
        let classrooms = {};
        let activeRoomId = null;
        let isExpired = false; // ตั้ง true ถ้าหมดเวลาจอง

        // ==========================================
        // 3. ระบบจำลอง Login (ปรับแก้ให้เข้ากับระบบคุณได้)
        // ==========================================
        function mockLogin() {
            if(localStorage.getItem('mockUser')) {
                currentUser = JSON.parse(localStorage.getItem('mockUser'));
                initApp();
            } else {
                Swal.fire({
                    title: 'เข้าสู่ระบบ',
                    html: `
                        <input id="swal-email" class="swal2-input" placeholder="อีเมล (เช่น test@school.com)">
                        <input id="swal-name" class="swal2-input" placeholder="ชื่อ-นามสกุล">
                        <select id="swal-role" class="swal2-input">
                            <option value="student">นักเรียน (Student)</option>
                            <option value="teacher">ครู (Teacher)</option>
                        </select>
                    `,
                    confirmButtonText: 'เข้าสู่ระบบ',
                    preConfirm: () => {
                        const email = document.getElementById('swal-email').value;
                        const name = document.getElementById('swal-name').value;
                        const role = document.getElementById('swal-role').value;
                        if(!email || !name) Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบ');
                        return { email, name, role };
                    }
                }).then((res) => {
                    if(res.isConfirmed) {
                        currentUser = res.value;
                        localStorage.setItem('mockUser', JSON.stringify(currentUser));
                        initApp();
                    }
                });
            }
        }

        function logout() {
            localStorage.removeItem('mockUser');
            location.reload();
        }

        // ==========================================
        // 4. โหลดข้อมูลและ UI
        // ==========================================
        function initApp() {
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userRole').innerText = currentUser.role === 'teacher' ? 'คุณครู' : 'นักเรียน';
            document.getElementById('userInfo').classList.remove('hidden');

            // ดึงข้อมูลห้องเรียนแบบ Real-time
            db.collection("classrooms").onSnapshot(snapshot => {
                classrooms = {};
                snapshot.forEach(doc => {
                    classrooms[doc.id] = { id: doc.id, ...doc.data() };
                });
                if (activeRoomId) {
                    renderRoomView(); // อัปเดตผังห้องถ้าอยู่ในห้อง
                } else {
                    renderUI(); // อัปเดตหน้าหลัก
                }
            });
        }

        function changePage(page) {
            if (page === 'home') activeRoomId = null;
            renderUI();
        }

        function renderUI() {
            if (activeRoomId) return renderRoomView();

            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'teacher'].includes(currentUser.role);
            let html = '';

            if (isStaff) {
                html += `
                <div class="flex justify-between items-end mb-8 animate-in">
                    <div>
                        <h2 class="text-3xl font-black drop-shadow-lg">จัดการห้องเรียน</h2>
                        <p class="text-white/70">ดูแลผังที่นั่งและนักเรียนของคุณ</p>
                    </div>
                    <button onclick="showCreateModal()" class="bg-[#5AB2FF] hover:bg-[#3b9df0] text-white px-5 py-3 rounded-full font-bold shadow-lg transition-all flex items-center gap-2">
                        <i class='bx bx-plus text-xl'></i> สร้างห้องใหม่
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                `;

                const roomIds = Object.keys(classrooms);
                if (roomIds.length === 0) {
                    html += `<div class="col-span-full text-center py-10 text-white/50">ยังไม่มีห้องเรียนในระบบ</div>`;
                } else {
                    roomIds.forEach(id => {
                        const room = classrooms[id];
                        const totalSeats = room.seats ? room.seats.length : 0;
                        const bookedSeats = room.seats ? room.seats.filter(s => s.bookedBy).length : 0;
                        const isFull = totalSeats > 0 && bookedSeats >= totalSeats;

                        html += `
                        <div onclick="enterRoom('${room.id}')" class="glass-panel p-6 rounded-3xl cursor-pointer hover:-translate-y-2 hover:shadow-2xl transition-all relative overflow-hidden group">
                            <div class="flex justify-between items-start mb-4">
                                <h4 class="text-3xl font-black">${room.name}</h4>
                                <button onclick="event.stopPropagation(); copyToClipboard('${room.id}')" class="bg-black/30 hover:bg-black/50 px-3 py-1.5 rounded-full text-xs flex items-center gap-1" title="คัดลอกรหัส">
                                    <i class='bx bx-copy'></i> ${room.id}
                                </button>
                            </div>
                            <div class="flex justify-between items-end">
                                <div class="flex items-center gap-2">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center ${isFull ? 'bg-red-500/20 text-red-300' : 'bg-green-500/20 text-green-300'}">
                                        <i class='bx bxs-chair text-xl'></i>
                                    </div>
                                    <div>
                                        <p class="text-white/60 text-[10px] uppercase">ที่นั่ง</p>
                                        <p class="${isFull ? 'text-red-300' : 'text-green-300'} font-bold">ว่าง ${totalSeats - bookedSeats}/${totalSeats}</p>
                                    </div>
                                </div>
                                <div class="text-[#5AB2FF] bg-white w-8 h-8 rounded-full flex items-center justify-center shadow-md">
                                    <i class='bx bx-chevron-right text-xl'></i>
                                </div>
                            </div>
                        </div>`;
                    });
                }
                html += `</div>`;
            } else {
                html = `
                <div class="glass-panel p-8 md:p-10 rounded-[3rem] max-w-lg mx-auto text-center mt-10 relative overflow-hidden">
                    <div class="w-24 h-24 bg-gradient-to-br from-[#5AB2FF] to-[#8390FA] rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                        <i class='bx bxs-door-open text-5xl text-white'></i>
                    </div>
                    <h3 class="text-3xl font-black mb-3">เข้าร่วมห้องเรียน</h3>
                    <p class="text-white/80 mb-8 font-light">กรอกรหัสห้องเรียนที่คุณครูให้มา เพื่อเข้าเลือกที่นั่ง</p>
                    
                    <div class="relative mb-6">
                        <i class='bx bx-hash absolute left-6 top-1/2 -translate-y-1/2 text-white/50 text-2xl'></i>
                        <input type="text" id="joinRoomId" placeholder="รหัสห้องเรียน..." class="w-full bg-black/20 border border-white/30 rounded-full pl-14 pr-6 py-5 outline-none text-center text-xl font-bold">
                    </div>
                    
                    <button onclick="joinRoom()" class="bg-white hover:bg-gray-100 text-[#5AB2FF] px-6 py-5 rounded-full font-black w-full flex justify-center items-center gap-3 text-lg">
                        เข้าสู่ห้องเรียน <i class='bx bx-right-arrow-alt text-2xl'></i>
                    </button>
                </div>`;
            }
            area.innerHTML = html;
        }

        // ==========================================
        // 5. ฟังก์ชันจัดการห้องเรียน (สร้าง, เข้า, ลบ, ก๊อปรหัส)
        // ==========================================
        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => Swal.fire({ icon: 'success', title: 'คัดลอกรหัสแล้ว', timer: 1000, showConfirmButton: false }));
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                Swal.fire({ icon: 'success', title: 'คัดลอกรหัสแล้ว', timer: 1000, showConfirmButton: false });
            }
        }

        async function showCreateModal() {
            const { value: formValues } = await Swal.fire({
                title: 'สร้างห้องเรียน',
                html: `
                    <input id="swal-id" class="swal2-input" placeholder="รหัสห้องเรียน (เช่น M101)">
                    <input id="swal-name" class="swal2-input" placeholder="ชื่อห้องเรียน (เช่น ม.1/1)">
                    <input id="swal-seats" type="number" class="swal2-input" placeholder="จำนวนที่นั่ง (เช่น 40)">
                `,
                showCancelButton: true,
                confirmButtonText: 'สร้าง',
                preConfirm: () => {
                    const id = document.getElementById('swal-id').value.trim();
                    const name = document.getElementById('swal-name').value.trim();
                    const seats = parseInt(document.getElementById('swal-seats').value);
                    if (!id || !name || isNaN(seats)) return Swal.showValidationMessage('กรอกข้อมูลให้ครบ');
                    if (classrooms[id]) return Swal.showValidationMessage('รหัสนี้มีแล้ว');
                    return { id, name, seats };
                }
            });

            if (formValues) {
                const seats = Array.from({ length: formValues.seats }, (_, i) => ({
                    id: i + 1,
                    x: (i % 8) * 90 + 50, 
                    y: Math.floor(i / 8) * 110 + 50,
                    bookedBy: null, bookedName: null
                }));

                await db.collection("classrooms").doc(formValues.id).set({
                    name: formValues.name, seats: seats,
                    createdBy: currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                Swal.fire({ icon: 'success', title: 'สร้างสำเร็จ!', timer: 1500, showConfirmButton: false });
            }
        }

        function joinRoom() {
            const id = document.getElementById('joinRoomId').value.trim();
            if (!id) return Swal.fire({ icon: 'warning', text: 'กรุณากรอกรหัส' });
            if (!classrooms[id]) return Swal.fire({ icon: 'error', text: 'ไม่พบห้องเรียน' });
            enterRoom(id);
        }

        function enterRoom(id) { activeRoomId = id; renderUI(); }

        // ==========================================
        // 6. หน้าผังห้องเรียน & วาดโต๊ะ
        // ==========================================
        function renderRoomView() {
            const room = classrooms[activeRoomId];
            if (!room) return changePage('home');
            const isStaff = ['super_admin', 'teacher'].includes(currentUser.role);
            
            let html = `
            <div>
                <div class="glass-panel p-4 mb-6 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-black">${room.name}</h2>
                        <p class="text-white/80 text-sm">รหัสห้อง: <b>${activeRoomId}</b></p>
                    </div>
                    <div class="flex flex-wrap gap-2">
            `;
            if (isStaff) {
                html += `
                        <button onclick="saveLayout()" class="bg-green-500 px-4 py-2 rounded-full font-bold text-sm shadow-md"><i class='bx bx-save'></i> บันทึกผัง</button>
                        <button onclick="exportToExcel()" class="bg-yellow-500 px-4 py-2 rounded-full font-bold text-sm shadow-md"><i class='bx bx-spreadsheet'></i> Excel</button>
                        <button onclick="deleteRoom()" class="bg-red-500 px-4 py-2 rounded-full font-bold text-sm shadow-md"><i class='bx bx-trash'></i> ลบห้อง</button>`;
            } else {
                html += `<button onclick="randomSeat()" class="bg-purple-500 px-4 py-2 rounded-full font-bold text-sm shadow-md"><i class='bx bx-dice-5'></i> สุ่มที่นั่ง</button>`;
            }
            html += `<button onclick="changePage('home')" class="bg-white/20 px-4 py-2 rounded-full font-bold text-sm"><i class='bx bx-exit'></i> ออก</button>
                    </div>
                </div>
                <div class="map-area custom-scrollbar" id="mapArea" style="touch-action: none;">
                    <div id="roomCanvas"></div>
                </div>
            </div>`;
            document.getElementById('contentArea').innerHTML = html;
            renderDesks();
        }

        // ==========================================
        // 7. ระบบลากวาง (Drag & Drop) & จองที่นั่ง
        // ==========================================
        let dragItem = null;
        let startX, startY, initialX, initialY;

        function renderDesks() {
            const room = classrooms[activeRoomId];
            const canvas = document.getElementById('roomCanvas');
            if (!room || !canvas) return;
            const isStaff = ['super_admin', 'teacher'].includes(currentUser.role);
            canvas.innerHTML = '';
            
            room.seats.forEach(seat => {
                const el = document.createElement('div');
                const isMySeat = seat.bookedBy === currentUser.email;
                const isBooked = seat.bookedBy && !isMySeat;
                
                el.className = `desk ${isBooked ? 'booked' : ''} ${isMySeat ? 'my-seat' : ''}`;
                el.id = `seat-${seat.id}`;
                el.style.left = `${seat.x}px`;
                el.style.top = `${seat.y}px`;
                
                let svgHTML = `
                    <svg width="70" height="85">
                        <rect class="desk-chair" x="15" y="5" width="40" height="30" rx="4" />
                        <rect class="desk-top" x="5" y="25" width="60" height="55" rx="6" />
                        <line class="desk-line" x1="15" y1="40" x2="55" y2="40" />
                    </svg>
                    <div class="desk-label">${seat.id}</div>
                `;
                
                let tooltip = isMySeat ? "ที่นั่งของคุณ (คลิกยกเลิก)" : isBooked ? `จองโดย: ${seat.bookedName}` : isStaff ? `ลากเพื่อย้าย` : "ว่าง (คลิกจอง)";
                svgHTML += `<div class="desk-tooltip">${tooltip}</div>`;
                el.innerHTML = svgHTML;

                if (isStaff) {
                    el.addEventListener('mousedown', dragStart);
                    el.addEventListener('touchstart', dragStart, {passive: false});
                } else {
                    el.addEventListener('click', () => handleBooking(seat.id));
                }
                canvas.appendChild(el);
            });
        }

        function dragStart(e) {
            if (e.target.closest('.desk-tooltip')) return;
            dragItem = e.currentTarget;
            dragItem.classList.add('dragging');
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            startX = clientX; startY = clientY;
            initialX = parseInt(dragItem.style.left || 0);
            initialY = parseInt(dragItem.style.top || 0);

            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag, {passive: false});
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }

        function drag(e) {
            if (!dragItem) return;
            e.preventDefault(); 
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            
            const zoom = window.innerWidth <= 600 ? 0.55 : (window.innerWidth <= 1024 ? 0.8 : 1);
            const dx = (clientX - startX) / zoom;
            const dy = (clientY - startY) / zoom;
            
            let newX = Math.max(0, Math.min(1430, initialX + dx));
            let newY = Math.max(0, Math.min(1415, initialY + dy));
            
            dragItem.style.left = `${Math.round(newX / 10) * 10}px`;
            dragItem.style.top = `${Math.round(newY / 10) * 10}px`;
        }

        function dragEnd() {
            if (!dragItem) return;
            dragItem.classList.remove('dragging');
            dragItem = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('mouseup', dragEnd);
            document.removeEventListener('touchend', dragEnd);
        }

        async function saveLayout() {
            const room = classrooms[activeRoomId];
            const canvas = document.getElementById('roomCanvas');
            const newSeats = [...room.seats];
            Array.from(canvas.children).forEach(el => {
                if(el.classList.contains('desk')) {
                    const id = parseInt(el.id.split('-')[1]);
                    const seat = newSeats.find(s => s.id === id);
                    if (seat) { seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top); }
                }
            });
            await db.collection("classrooms").doc(activeRoomId).update({ seats: newSeats });
            Swal.fire({ icon: 'success', title: 'บันทึกผังแล้ว', timer: 1000, showConfirmButton: false });
        }

        async function handleBooking(seatId) {
            if (isExpired) return Swal.fire('หมดเวลา', 'ระบบปิดจองแล้ว', 'error');
            const room = classrooms[activeRoomId];
            const seatIndex = room.seats.findIndex(s => s.id === seatId);
            const seat = room.seats[seatIndex];
            
            if (seat.bookedBy === currentUser.email) {
                const res = await Swal.fire({ title: 'ยกเลิกจอง?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
                if (res.isConfirmed) {
                    room.seats[seatIndex].bookedBy = null; room.seats[seatIndex].bookedName = null;
                    await db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
                }
                return;
            }
            if (seat.bookedBy) return Swal.fire('ไม่ว่าง', 'ที่นั่งถูกจองแล้ว', 'warning');
            if (room.seats.find(s => s.bookedBy === currentUser.email)) return Swal.fire('เตือน!', 'จองได้ 1 ที่เท่านั้น', 'error');

            room.seats[seatIndex].bookedBy = currentUser.email; room.seats[seatIndex].bookedName = currentUser.name;
            await db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
            Swal.fire({ icon: 'success', title: 'จองสำเร็จ', timer: 1000, showConfirmButton: false });
        }

        async function randomSeat() {
            if (isExpired) return Swal.fire('หมดเวลา', 'ระบบปิดจองแล้ว', 'error');
            const room = classrooms[activeRoomId];
            if (room.seats.find(s => s.bookedBy === currentUser.email)) return Swal.fire('เตือน!', 'คุณมีที่นั่งแล้ว', 'info');

            const available = room.seats.filter(s => !s.bookedBy);
            if (available.length === 0) return Swal.fire('เต็ม!', 'ไม่มีที่ว่าง', 'error');

            Swal.fire({ title: 'กำลังสุ่ม...', didOpen: () => Swal.showLoading() });
            setTimeout(async () => {
                const rand = available[Math.floor(Math.random() * available.length)];
                const index = room.seats.findIndex(s => s.id === rand.id);
                room.seats[index].bookedBy = currentUser.email; room.seats[index].bookedName = currentUser.name;
                await db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
                Swal.fire({ icon: 'success', title: `ได้ที่นั่ง ${rand.id}` });
            }, 800);
        }

        function exportToExcel() {
            const data = classrooms[activeRoomId].seats.map(s => ({
                'หมายเลข': s.id, 'สถานะ': s.bookedBy ? 'จองแล้ว' : 'ว่าง',
                'ชื่อ': s.bookedName || '-', 'อีเมล': s.bookedBy || '-'
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Seats");
            XLSX.writeFile(wb, `Room_${activeRoomId}.xlsx`);
        }

        async function deleteRoom() {
            const res = await Swal.fire({ title: 'ลบห้อง?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if (res.isConfirmed) {
                await db.collection("classrooms").doc(activeRoomId).delete();
                changePage('home');
            }
        }

        // ป้องกันดึงจอเผลอปิดตอนลาก
        window.addEventListener('beforeunload', (e) => { if (dragItem) { e.preventDefault(); e.returnValue = ''; } });

        // เริ่มการทำงาน
        window.onload = mockLogin;
    </script>
</body>
</html>
