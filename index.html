<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - Premium Seating</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.28);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(180deg, #87CEEB 0%, #7B68EE 50%, #FF69B4 100%);
            background-attachment: fixed;
            min-height: 100vh; color: white; overflow-x: hidden; margin: 0;
        }

        .cloud-footer {
            position: fixed;
            bottom: -40px; left: 0; width: 100%; height: 180px;
            background: url('https://www.transparenttextures.com/patterns/clouds.png');
            filter: brightness(0) invert(1) opacity(0.5);
            z-index: 1; pointer-events: none;
        }

        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(25px) saturate(180%); 
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .glass-pill { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 999px;
        }

        /* Progress Bar */
        .progress-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.25); border-radius: 999px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: #22c55e; transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }

        /* Desk & Chair Design */
        .desk { width: 68px; height: 82px; position: absolute; transition: all 0.3s; cursor: pointer; }
        .desk:hover { transform: translateY(-5px); z-index: 50; }
        .desk-part { fill: rgba(255, 255, 255, 0.75); stroke: white; stroke-width: 1.5; rx: 8; }
        .chair-part { fill: rgba(255, 255, 255, 0.45); stroke: white; stroke-width: 1.5; }
        
        .booked .desk-part { fill: #818cf8; stroke: #6366f1; }
        .my-seat .desk-part { fill: #22c55e; stroke: #16a34a; filter: drop-shadow(0 0 12px #22c55e); }
        .desk-label { position: absolute; top: 25px; width: 100%; text-align: center; font-size: 11px; font-weight: 800; color: #334155; pointer-events: none; }

        .animate-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive Optimization */
        @media (max-width: 768px) {
            .map-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }
            .map-inner { transform: scale(0.9); transform-origin: top left; }
            h1 { font-size: 2.8rem !important; }
        }
    </style>
</head>
<body>

    <div class="cloud-footer"></div>

    <div id="loginPage" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="glass p-10 w-full max-w-sm text-center rounded-[3.5rem] animate-in">
            <div class="w-28 h-28 mx-auto mb-8 bg-white rounded-full p-4 shadow-xl">
                <img src="photo/logo.png" alt="Logo" class="w-full h-full object-contain">
            </div>
            <div class="mb-10 text-white">
                <span class="glass-pill px-4 py-1 text-[10px] font-bold tracking-widest uppercase">NTUNISO · OCRS</span>
                <h1 class="text-4xl font-bold mt-4 drop-shadow-md">ระบบลงทะเบียน</h1>
                <p class="text-white/90 mt-2 text-sm font-light">นวมินทราชินูทิศ เตรียมอุดมศึกษาน้อมเกล้า</p>
            </div>
            <div id="g_id_onload" 
                 data-client_id="118310489688-ksc64dv5rnv7o9jo2oklfeeibc2qk452.apps.googleusercontent.com" 
                 data-callback="handleGoogleLogin">
            </div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large"></div>
            <p class="mt-10 text-[10px] font-bold opacity-60 tracking-widest uppercase">@ntun.ac.th only</p>
        </div>
    </div>

    <div id="mainApp" class="hidden relative z-10">
        <header class="p-6 md:p-8 flex flex-col sm:flex-row justify-between items-center gap-6 max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <div class="glass-pill p-2 w-14 h-14 flex items-center justify-center">
                    <img src="photo/logo.png" class="w-10 h-10 object-contain">
                </div>
                <h2 class="text-2xl font-bold tracking-tight uppercase drop-shadow-md">NTUN SPACE</h2>
            </div>
            <div class="flex items-center gap-3">
                <div class="glass-pill px-4 py-2 flex items-center gap-3">
                    <img id="userImg" class="w-9 h-9 rounded-full border-2 border-white/50">
                    <span id="userName" class="text-sm font-bold truncate max-w-[150px]"></span>
                </div>
                <button onclick="logout()" class="bg-red-500/80 hover:bg-red-600 px-6 py-2.5 rounded-full font-bold shadow-lg transition-all">ออกระบบ</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-24">
            <section id="studentAction" class="mt-10 animate-in">
                <p class="text-lg opacity-90 font-medium mb-1">Welcome back,</p>
                <h1 class="text-5xl md:text-6xl font-bold mb-10 drop-shadow-lg">สวัสดี, <span id="welcomeName"></span></h1>
                
                <div id="statusContainer"></div>

                <div id="joinBox" class="glass p-10 rounded-[3rem] max-w-2xl border-white/40 mt-8">
                    <h3 class="font-bold mb-6 flex items-center gap-2 text-xl"><i class='bx bx-door-open text-3xl'></i> กรอกรหัสชั้นเรียน</h3>
                    <div class="flex flex-col sm:flex-row gap-4">
                        <input id="joinCode" class="flex-1 glass bg-white/20 px-6 py-4 rounded-2xl text-2xl font-bold tracking-widest uppercase outline-none placeholder:text-white/40" placeholder="ROOM ID">
                        <button onclick="joinByCode()" class="bg-white text-indigo-600 px-10 py-4 rounded-2xl font-black text-lg shadow-2xl hover:scale-105 active:scale-95 transition-all">JOIN</button>
                    </div>
                </div>
            </section>

            <section id="staffAction" class="hidden mt-10 animate-in">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-10 gap-4">
                    <h2 class="text-3xl font-bold drop-shadow-md">คลังห้องเรียน</h2>
                    <button onclick="showCreateModal()" class="bg-white text-indigo-600 px-8 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition-all">+ สร้างห้องเรียน</button>
                </div>
                <div id="roomGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <div id="contentArea" class="mt-12"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null, activeRoomId = null, classrooms = {};

        // ฟังก์ชันดึง Username จากอีเมลเพื่อแก้ปัญหาชื่อแปลกๆ
        function getUsername(email) {
            return email.split('@')[0];
        }

        async function handleGoogleLogin(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire('ใช้ @ntun.ac.th เท่านั้น', '', 'error');
            
            currentUser = { 
                email, 
                name: getUsername(email), 
                picture: payload.picture, 
                role: (email === SUPER_ADMIN ? 'admin' : 'student') 
            };
            localStorage.setItem('ntun_session_final', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_final');
            if (!saved) return;
            currentUser = JSON.parse(saved);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;
            document.getElementById('welcomeName').innerText = currentUser.name;

            if(currentUser.role === 'admin') {
                document.getElementById('staffAction').classList.remove('hidden');
                document.getElementById('joinBox').classList.add('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function renderUI() {
            if (activeRoomId) renderRoomView();
            else if (currentUser.role === 'admin') renderAdminGrid();
            else renderStudentStatus();
        }

        function renderAdminGrid() {
            const grid = document.getElementById('roomGrid');
            grid.innerHTML = Object.entries(classrooms).map(([id, room]) => {
                const booked = room.seats.filter(s => s.bookedBy).length;
                const total = room.seats.length;
                const percent = (booked / total) * 100;
                return `
                <div class="glass p-8 rounded-[3rem] cursor-pointer hover:bg-white/30 transition-all animate-in" onclick="enterRoom('${id}')">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-bold bg-white/30 px-3 py-1 rounded-full">${id}</span>
                        <i class='bx bx-trash text-white/40 hover:text-red-500' onclick="event.stopPropagation(); deleteRoom('${id}')"></i>
                    </div>
                    <h3 class="text-2xl font-bold">${room.name}</h3>
                    <p class="text-sm opacity-80 mt-2 font-medium">จองแล้ว: ${booked} / ${total}</p>
                    <div class="progress-container"><div class="progress-fill" style="width: ${percent}%"></div></div>
                </div>`;
            }).join('');
        }

        function renderStudentStatus() {
            const area = document.getElementById('statusContainer');
            const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
            if (myRoomId) {
                const room = classrooms[myRoomId];
                const seat = room.seats.find(s => s.bookedBy === currentUser.email);
                area.innerHTML = `
                <div class="glass p-10 rounded-[3rem] max-w-xl animate-in border-white/60 shadow-2xl">
                    <span class="bg-green-500 text-[10px] font-bold px-4 py-1 rounded-full shadow-lg">ลงทะเบียนสำเร็จ</span>
                    <h2 class="text-4xl font-bold mt-6">${room.name}</h2>
                    <p class="text-xl opacity-90 mt-2">เลขที่นั่งของคุณ: <span class="text-4xl font-black text-indigo-100 underline">${seat.id}</span></p>
                    <button onclick="enterRoom('${myRoomId}')" class="w-full mt-10 bg-white text-indigo-600 py-5 rounded-[2rem] font-bold shadow-xl hover:scale-105 transition-all">ดูผังที่นั่ง</button>
                </div>`;
                document.getElementById('joinBox').classList.add('hidden');
            } else {
                area.innerHTML = "";
                document.getElementById('joinBox').classList.remove('hidden');
            }
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            document.getElementById('contentArea').innerHTML = `
                <div class="flex justify-between items-center mb-8 animate-in">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-6 py-2.5 font-bold hover:bg-white/40 transition-all"><i class='bx bx-chevron-left'></i> ย้อนกลับ</button>
                    <h2 class="text-3xl font-bold drop-shadow-md">${room.name}</h2>
                </div>
                <div class="map-outer glass rounded-[4rem] p-6 md:p-12 border-white/30 overflow-auto">
                    <div class="map-inner w-[950px] h-[750px] mx-auto relative">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[450px] h-3 bg-white/40 rounded-full"></div>
                        <p class="absolute top-6 left-1/2 -translate-x-1/2 text-[10px] font-black opacity-40 uppercase tracking-[0.5em]">FRONT OF CLASS</p>
                        ${room.seats.map(s => {
                            const isMe = s.bookedBy === currentUser.email;
                            const state = isMe ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            return `
                            <div class="desk ${state}" style="left:${s.x}px; top:${s.y}px;" onclick="handleBooking('${s.id}')">
                                <svg viewBox="0 0 100 120" class="drop-shadow-lg">
                                    <path d="M25,80 L75,80 L70,110 L30,110 Z" class="chair-part" />
                                    <rect x="5" y="10" width="90" height="60" class="desk-part" />
                                </svg>
                                <div class="desk-label">${isMe ? 'ME' : (s.bookedBy ? 'FULL' : s.id)}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        async function joinByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (classrooms[code]) enterRoom(code);
            else Swal.fire('ไม่พบรหัสห้อง!', 'โปรดตรวจสอบรหัสอีกครั้ง', 'warning');
        }

        function enterRoom(id) { activeRoomId = id; renderUI(); }
        function logout() { localStorage.removeItem('ntun_session_final'); location.reload(); }

        async function handleBooking(sid) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === sid);
            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || currentUser.role === 'admin') {
                    const res = await Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'question', showCancelButton: true });
                    if (res.isConfirmed) {
                        seat.bookedBy = null;
                        db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
                    }
                }
                return;
            }
            if (room.seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire('คุณจองที่นั่งไปแล้ว!', '', 'error');
            seat.bookedBy = currentUser.email;
            db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
        }

        function showCreateModal() {
            Swal.fire({
                title: 'สร้างห้องเรียนใหม่',
                html: `<input id="rn" class="swal2-input" placeholder="ชื่อห้อง"><input id="rc" type="number" class="swal2-input" placeholder="จำนวนที่นั่ง">`,
                preConfirm: () => [document.getElementById('rn').value, document.getElementById('rc').value]
            }).then(res => {
                if(!res.value || !res.value[0]) return;
                const [name, count] = res.value;
                const id = Math.random().toString(36).substring(2, 7).toUpperCase();
                const seats = [];
                for(let i=0; i<count; i++) {
                    const col = i % 8; const row = Math.floor(i / 8);
                    seats.push({ id: i+1, x: (col * 105) + 60, y: (row * 130) + 110, bookedBy: null });
                }
                db.collection("classrooms").doc(id).set({ name, seats });
            });
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ลบห้องเรียน?', icon: 'warning', showCancelButton: true });
            if(res.isConfirmed) db.collection("classrooms").doc(id).delete();
        }

        window.onload = initApp;
    </script>
</body>
</html>
