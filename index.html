<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUNSpace - Premium Seating</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; color: white; 
            overflow-x: hidden;
            background: linear-gradient(180deg, #5AB2FF 0%, #8390FA 50%, #F5A9CE 100%) !important;
            background-attachment: fixed !important;
            scroll-behavior: smooth;
        }

        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 290px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 330px 180px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 460px 120px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 10vw 80vh, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80vw 20vh, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60vw 60vh, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 500px 500px;
            opacity: 0.8; z-index: 0; pointer-events: none;
            animation: drift 150s linear infinite;
        }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 500px 500px; } }

        .glass-panel { 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.15);
        }

        .desk { 
            width: 70px; height: 85px; position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; touch-action: none; z-index: 20;
        }
        .desk:hover:not(.dragging) { transform: translateY(-5px) scale(1.05); z-index: 30; }
        .desk.dragging { transition: none !important; z-index: 50; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); transform: scale(1.1); }

        .desk-chair { fill: rgba(255, 255, 255, 0.3); stroke: rgba(255, 255, 255, 0.6); stroke-width: 1.5; rx: 8; transition: all 0.3s; }
        .desk-top { fill: rgba(255, 255, 255, 0.5); stroke: rgba(255, 255, 255, 0.9); stroke-width: 1.5; rx: 6; transition: all 0.3s; }
        .desk-line { stroke: rgba(255, 255, 255, 0.7); stroke-width: 1.5; stroke-linecap: round; }

        .booked .desk-chair { fill: rgba(239, 68, 68, 0.6); stroke: #ef4444; }
        .booked .desk-top { fill: rgba(248, 113, 113, 0.8); stroke: #fee2e2; }
        .my-seat .desk-chair { fill: rgba(34, 197, 94, 0.6); stroke: #22c55e; }
        .my-seat .desk-top { fill: rgba(74, 222, 128, 0.9); stroke: #ffffff; filter: drop-shadow(0 0 12px rgba(34, 197, 94, 0.8)); }
        
        .desk-label { position: absolute; top: 38px; width: 100%; text-align: center; font-size: 14px; font-weight: 800; color: #1e293b; pointer-events: none; text-shadow: 0px 0px 4px rgba(255,255,255,0.8); }

        .desk-tooltip {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-10px);
            background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; font-size: 12px;
            white-space: nowrap; border-radius: 8px; opacity: 0; pointer-events: none; transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px);
        }
        .desk:hover:not(.dragging) .desk-tooltip { opacity: 1; transform: translateX(-50%) translateY(-5px); }

        .map-area { border-radius: 2rem; background: rgba(0, 0, 0, 0.15); box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.1); position: relative; overflow: auto; display: flex; justify-content: center; min-height: 600px; }
        #roomCanvas { position: relative; width: 1000px; height: 800px; transform-origin: top center; transition: transform 0.3s ease; }

        @media (max-width: 600px) { #roomCanvas { zoom: 0.55; } .map-area { justify-content: flex-start; } }
        
        .animate-in { animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .countdown-box { display: flex; gap: 12px; align-items: center; justify-content: center; }
        .time-block { 
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px; border-radius: 16px; min-width: 65px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .time-val { font-size: 24px; font-weight: 800; color: #fff; }
        .time-lbl { font-size: 10px; color: rgba(255,255,255,0.7); }
        .expired-text { font-size: 24px; font-weight: 800; color: #fca5a5; text-align: center; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div id="loginPage" class="relative z-10 flex min-h-screen items-center justify-center p-4">
        <div class="glass-panel p-10 w-full max-w-md text-center rounded-[2.5rem] animate-in">
            <div class="w-32 h-32 mx-auto mb-6">
                <img src="photo/logo.png" alt="Logo" class="w-full h-full object-contain drop-shadow-xl">
            </div>
            <h1 class="text-4xl font-black mb-1 tracking-tight uppercase">NTUN SPACE</h1>
            <p class="text-white/80 mb-8 font-light">ระบบจองที่นั่งออนไลน์พรีเมียม</p>
            
            <div class="bg-white rounded-full p-1.5 w-max mx-auto shadow-xl flex justify-center items-center">
                <div id="g_id_onload" data-client_id="118310489688-8o6l3ogkihci3des8aab8qdd83a7r6gg.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-size="large"></div>
            </div>
            <p class="mt-6 text-[11px] opacity-70 uppercase tracking-widest">@ntun.ac.th only</p>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col relative z-10">
        <header class="p-6 flex flex-col sm:flex-row justify-between items-center gap-4 max-w-7xl mx-auto w-full animate-in">
            <div class="glass-panel px-6 py-2 flex items-center gap-4 rounded-full">
                <img src="photo/logo.png" class="w-10 h-10 object-contain">
                <div class="text-left">
                    <h1 class="font-bold text-base leading-tight tracking-widest uppercase">NTUNSPACE</h1>
                    <p class="text-[10px] opacity-70">PREMIUM SEATING</p>
                </div>
            </div>
            <div class="glass-panel p-1.5 flex items-center gap-2 rounded-full">
                <button onclick="changePage('home')" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full text-sm font-medium transition-all">หน้าแรก</button>
                <button id="btnSettings" onclick="changePage('settings')" class="hidden bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full text-sm font-medium transition-all">ตั้งค่า</button>
                <div class="flex items-center gap-2 px-3 border-l border-white/20">
                    <img id="userImg" src="" class="w-8 h-8 rounded-full border border-white/50">
                    <span id="userName" class="text-sm font-medium hidden md:block"></span>
                </div>
                <button onclick="logout()" class="bg-red-500/80 hover:bg-red-500 px-3 py-2 rounded-full transition-all"><i class='bx bx-log-out'></i></button>
            </div>
        </header>

        <div id="globalTimerBanner" class="hidden max-w-7xl mx-auto w-full px-6 mb-4 animate-in">
            <div class="glass-panel p-6 rounded-[2rem] flex flex-col items-center border-2 border-white/20">
                <p class="text-sm uppercase tracking-widest mb-4 font-bold flex items-center gap-2"><i class='bx bx-time'></i> เวลาปิดจองทั้งระบบ</p>
                <div id="globalCountdownContainer" class="countdown-box">
                    <div class="time-block"><div id="gt-d" class="time-val">00</div><div class="time-lbl">วัน</div></div>
                    <div class="time-block"><div id="gt-h" class="time-val">00</div><div class="time-lbl">ชม.</div></div>
                    <div class="time-block"><div id="gt-m" class="time-val">00</div><div class="time-lbl">นาที</div></div>
                    <div class="time-block"><div id="gt-s" class="time-val">00</div><div class="time-lbl">วินาที</div></div>
                </div>
            </div>
        </div>

        <main class="flex-grow max-w-7xl mx-auto w-full px-6 pb-20">
            <div id="viewHome">
                <section id="welcomeSection" class="mt-4 mb-8 text-left animate-in">
                    <p class="text-white/80 mb-1">ยินดีต้อนรับ</p>
                    <h2 class="text-4xl font-bold mb-6 tracking-tight">สวัสดี, <span id="welcomeName">นักเรียน</span> <span id="roleBadge" class="hidden text-sm bg-blue-500 px-3 py-1 rounded-full ml-2 uppercase"></span></h2>
                    <div id="dashboardStats" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </section>

                <section id="staffAction" class="hidden mb-8 animate-in">
                    <div class="flex flex-col md:flex-row gap-4 items-center glass-panel p-4 rounded-[2rem]">
                        <div class="relative flex-1 w-full">
                            <i class='bx bx-search absolute left-5 top-1/2 -translate-y-1/2 opacity-50 text-xl'></i>
                            <input type="text" id="roomSearch" oninput="renderDashboard()" class="w-full bg-black/20 border border-white/20 rounded-full py-3.5 pl-14 pr-6 outline-none text-white focus:bg-black/30 transition-all" placeholder="ค้นหาชื่อห้อง...">
                        </div>
                        <button onclick="showCreateModal()" class="bg-white text-blue-500 px-8 py-3.5 w-full md:w-auto rounded-full font-bold shadow-xl transition-all hover:scale-105">สร้างห้องใหม่</button>
                    </div>
                </section>

                <div id="contentArea"></div>
            </div>

            <div id="viewSettings" class="hidden animate-in">
                <div class="glass-panel p-8 md:p-10 rounded-[2.5rem]">
                    <h2 class="text-3xl font-bold mb-8 border-b border-white/10 pb-4">ตั้งค่าระบบ (Admin)</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-black/20 p-6 rounded-3xl border border-white/10">
                            <h3 class="font-bold mb-4">เวลาปิดรับจอง</h3>
                            <button onclick="setGlobalDeadlineUI()" class="w-full bg-blue-500 mb-2 py-3 rounded-xl font-bold">ตั้งเวลา</button>
                            <button onclick="clearGlobalDeadline()" class="w-full bg-red-500/30 py-3 rounded-xl">ยกเลิกเวลา</button>
                        </div>
                        <div class="bg-black/20 p-6 rounded-3xl border border-white/10">
                            <h3 class="font-bold mb-4">จัดการสิทธิ์ครู</h3>
                            <div class="flex gap-2 mb-4">
                                <input type="email" id="newTeacherEmail" placeholder="อีเมล @ntun.ac.th" class="flex-1 bg-white/10 rounded-xl px-4 py-2 outline-none">
                                <button onclick="addTeacher()" class="bg-white text-black px-4 rounded-xl">เพิ่ม</button>
                            </div>
                            <div id="teacherListContainer" class="space-y-2 h-32 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null, activeRoomId = null, classrooms = {}, globalDeadline = null, systemRoles = { teachers: [] }, isExpired = false, timerInterval = null;

        function decodeJwt(token) {
            try { return JSON.parse(decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))); } catch (e) { return null; }
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire('ไม่อนุญาต', 'กรุณาใช้ @ntun.ac.th', 'error');
            currentUser = { email, name: payload.name, picture: payload.picture, role: 'student' };
            localStorage.setItem('ntun_session_v15', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v15');
            if (!saved) return;
            currentUser = JSON.parse(saved);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;
            document.getElementById('welcomeName').innerText = currentUser.name.split(' ')[0];

            db.collection("settings").doc("roles").onSnapshot(doc => {
                if(doc.exists) systemRoles = doc.data();
                if (currentUser.email === SUPER_ADMIN) currentUser.role = 'super_admin';
                else if (systemRoles.teachers?.includes(currentUser.email)) currentUser.role = 'teacher';
                const isStaff = ['super_admin', 'teacher'].includes(currentUser.role);
                document.getElementById('staffAction').classList.toggle('hidden', !isStaff);
                document.getElementById('btnSettings').classList.toggle('hidden', !isStaff);
                const badge = document.getElementById('roleBadge');
                badge.innerText = currentUser.role;
                badge.classList.remove('hidden');
                renderUI();
                renderTeacherList();
            });

            db.collection("settings").doc("system").onSnapshot(doc => {
                if(doc.exists) startGlobalTimer(doc.data().globalDeadline);
            });

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
                updateStats();
            });
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const query = document.getElementById('roomSearch')?.value.toLowerCase() || '';
            const isStaff = ['super_admin', 'teacher'].includes(currentUser.role);
            let html = '';

            if (isStaff) {
                // --- ระบบ Smart Sorting เรียงลำดับห้อง 1/1, 1/2, 1/10 ---
                const sortedKeys = Object.keys(classrooms).sort((a, b) => {
                    return classrooms[a].name.localeCompare(classrooms[b].name, undefined, { numeric: true, sensitivity: 'base' });
                });

                html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
                sortedKeys.forEach(id => {
                    const room = classrooms[id];
                    if (room.name.toLowerCase().includes(query) || id.toLowerCase().includes(query)) {
                        const booked = room.seats.filter(s => s.bookedBy).length;
                        html += `
                        <div class="glass-panel p-6 rounded-[2rem] flex flex-col group relative">
                            <div class="flex justify-between mb-4">
                                <span onclick="copyToClipboard('${id}')" class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-mono cursor-pointer hover:bg-blue-500 transition-all border border-white/20">
                                    <i class='bx bx-copy'></i> ID: ${id}
                                </span>
                                <button onclick="deleteRoom('${id}')" class="opacity-30 hover:opacity-100 text-red-400"><i class='bx bx-trash'></i></button>
                            </div>
                            <h3 class="text-2xl font-bold mb-4 truncate">${room.name}</h3>
                            <div class="flex justify-between text-xs mb-2"><span>ความจุ</span><span>${booked}/${room.seats.length}</span></div>
                            <div class="w-full bg-black/20 h-1.5 rounded-full mb-6 overflow-hidden">
                                <div class="bg-blue-400 h-full" style="width:${(booked/room.seats.length)*100}%"></div>
                            </div>
                            <div class="mt-auto space-y-2">
                                <button onclick="enterRoom('${id}')" class="w-full bg-white text-blue-500 py-3 rounded-2xl font-bold">เข้าจัดการห้อง</button>
                                <button onclick="exportToExcel('${id}')" class="w-full bg-green-500/20 py-2 rounded-xl text-xs font-bold border border-green-500/20"><i class='bx bx-spreadsheet'></i> Export Excel</button>
                            </div>
                        </div>`;
                    }
                });
                html += `</div>`;
            } else {
                html = `
                <div class="max-w-md mx-auto glass-panel p-8 rounded-[2.5rem] text-center shadow-2xl">
                    <i class='bx bx-key text-5xl mb-6'></i>
                    <h3 class="text-2xl font-bold mb-2">เข้าห้องเรียน</h3>
                    <input type="text" id="joinRoomId" placeholder="กรอกรหัส 6 หลัก" class="w-full bg-black/20 border-2 border-white/20 rounded-2xl py-4 text-center text-3xl font-mono uppercase focus:border-blue-400 outline-none mb-4">
                    <button onclick="enterRoom(document.getElementById('joinRoomId').value.trim().toUpperCase())" class="w-full bg-white text-blue-500 py-4 rounded-2xl font-black text-lg">ตกลง</button>
                </div>`;
            }
            area.innerHTML = html;
        }

        // --- Utils ---
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, timerProgressBar: true });
                Toast.fire({ icon: 'success', title: `คัดลอกรหัส ${text} แล้ว` });
            });
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ลบห้องเรียน?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if (res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        function enterRoom(id) {
            if (!classrooms[id]) return Swal.fire('ผิดพลาด', 'ไม่พบรหัสห้องนี้', 'error');
            activeRoomId = id;
            renderUI();
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'teacher'].includes(currentUser.role);
            const area = document.getElementById('contentArea');
            area.innerHTML = `
                <div class="animate-in">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changePage('home')" class="bg-white/10 px-4 py-2 rounded-full"><i class='bx bx-left-arrow-alt'></i> กลับ</button>
                        <h2 class="text-3xl font-bold">${room.name}</h2>
                        <div>${isStaff ? `<button onclick="randomizeSeats('${activeRoomId}')" class="bg-yellow-400 text-black px-4 py-2 rounded-full font-bold">สุ่ม</button>` : ''}</div>
                    </div>
                    <div class="map-area glass-panel">
                        <div id="roomCanvas">
                            <div class="absolute top-0 left-1/2 -translate-x-1/2 bg-white/10 px-10 py-2 rounded-b-xl opacity-40">หน้ากระดาน</div>
                            ${room.seats.map(s => {
                                const isMySeat = s.bookedBy === currentUser.email;
                                return `<div id="seat-${s.id}" class="desk ${s.bookedBy ? 'booked' : ''} ${isMySeat ? 'my-seat' : ''}" style="left:${s.x}px;top:${s.y}px" onclick="handleSeatClick('${activeRoomId}', ${s.id})" ${isStaff ? `onmousedown="startDrag(event, ${s.id})"` : ''}>
                                    <div class="desk-tooltip">${s.userName || 'ว่าง'}</div>
                                    <svg viewBox="0 0 70 85"><rect class="desk-chair" x="15" y="55" width="40" height="25" /><rect class="desk-top" x="5" y="10" width="60" height="40" /></svg>
                                    <div class="desk-label">${s.id}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
        }

        async function handleSeatClick(roomId, seatId) {
            if (isExpired && !['super_admin', 'teacher'].includes(currentUser.role)) return Swal.fire('ปิดรับจอง', 'หมดเวลาที่ครูกำหนดแล้ว', 'lock');
            const room = classrooms[roomId];
            const idx = room.seats.findIndex(s => s.id === seatId);
            const seat = room.seats[idx];

            if (seat.bookedBy === currentUser.email) {
                const res = await Swal.fire({ title: 'ยกเลิกการจอง?', showCancelButton: true });
                if (res.isConfirmed) { room.seats[idx].bookedBy = null; room.seats[idx].userName = null; }
            } else if (!seat.bookedBy) {
                if (room.seats.find(s => s.bookedBy === currentUser.email)) return Swal.fire('ผิดพลาด', 'คุณจองไปแล้วหนึ่งที่นั่ง', 'warning');
                const res = await Swal.fire({ title: `จองที่นั่งเบอร์ ${seatId}?`, showCancelButton: true });
                if (res.isConfirmed) { room.seats[idx].bookedBy = currentUser.email; room.seats[idx].userName = currentUser.name; }
            } else { return; }
            await db.collection("classrooms").doc(roomId).update({ seats: room.seats });
        }

        let dragTarget = null;
        function startDrag(e, seatId) {
            dragTarget = { id: seatId, ox: e.clientX, oy: e.clientY };
            const el = document.getElementById(`seat-${seatId}`);
            el.classList.add('dragging');
            document.onmousemove = (ev) => {
                const room = classrooms[activeRoomId];
                const idx = room.seats.findIndex(s => s.id === seatId);
                const dx = ev.clientX - dragTarget.ox; const dy = ev.clientY - dragTarget.oy;
                room.seats[idx].x += dx; room.seats[idx].y += dy;
                el.style.left = room.seats[idx].x + 'px'; el.style.top = room.seats[idx].y + 'px';
                dragTarget.ox = ev.clientX; dragTarget.oy = ev.clientY;
            };
            document.onmouseup = async () => {
                document.onmousemove = null; el.classList.remove('dragging');
                await db.collection("classrooms").doc(activeRoomId).update({ seats: classrooms[activeRoomId].seats });
            };
        }

        function startGlobalTimer(deadline) {
            clearInterval(timerInterval);
            if (!deadline) { document.getElementById('globalTimerBanner').classList.add('hidden'); isExpired = false; return; }
            document.getElementById('globalTimerBanner').classList.remove('hidden');
            timerInterval = setInterval(() => {
                const diff = deadline - new Date().getTime();
                if (diff <= 0) { isExpired = true; document.getElementById('globalCountdownContainer').innerHTML = `<div class="expired-text">หมดเวลาการจอง</div>`; return; }
                isExpired = false;
                document.getElementById('gt-d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('gt-h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('gt-m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('gt-s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }, 1000);
        }

        async function showCreateModal() {
            const { value: v } = await Swal.fire({
                title: 'สร้างห้องเรียน',
                html: `<input id="sw-n" class="swal2-input" placeholder="ชื่อห้อง (เช่น 1/1)"><input id="sw-c" type="number" class="swal2-input" placeholder="จำนวนที่นั่ง">`,
                preConfirm: () => [document.getElementById('sw-n').value, document.getElementById('sw-c').value]
            });
            if (v && v[0] && v[1]) {
                const id = Math.random().toString(36).substring(2, 8).toUpperCase();
                const seats = [];
                for (let i = 1; i <= v[1]; i++) seats.push({ id: i, x: (i % 8) * 90 + 50, y: Math.floor(i / 8) * 110 + 100, bookedBy: null, userName: null });
                await db.collection("classrooms").doc(id).set({ name: v[0], seats, createdBy: currentUser.email });
            }
        }

        function exportToExcel(id) {
            const data = classrooms[id].seats.map(s => ({ "ที่นั่ง": s.id, "ชื่อ": s.userName || "ว่าง", "อีเมล": s.bookedBy || "-" }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "รายชื่อ");
            XLSX.writeFile(wb, `ที่นั่ง_${classrooms[id].name}.xlsx`);
        }

        function changePage(p) {
            document.getElementById('viewHome').classList.toggle('hidden', p !== 'home');
            document.getElementById('viewSettings').classList.toggle('hidden', p !== 'settings');
            activeRoomId = null; renderUI();
        }

        function logout() { localStorage.removeItem('ntun_session_v15'); location.reload(); }
        function renderUI() { if(activeRoomId) renderRoomView(); else renderDashboard(); }
        window.onload = initApp;
    </script>
</body>
</html>
