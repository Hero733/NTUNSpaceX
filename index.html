<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - Premium Seating</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; color: white; 
            overflow-x: hidden;
            background: linear-gradient(180deg, #5AB2FF 0%, #8390FA 50%, #F5A9CE 100%) !important;
            background-attachment: fixed !important;
            scroll-behavior: smooth;
        }

        /* เอฟเฟกต์ดวงดาว */
        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 290px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 330px 180px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 460px 120px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 10vw 80vh, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80vw 20vh, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60vw 60vh, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 500px 500px;
            opacity: 0.8; z-index: 0; pointer-events: none;
            animation: drift 150s linear infinite;
        }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 500px 500px; } }

        .glass-panel { 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.15);
        }

        /* ปรับขนาดโต๊ะและดีไซน์ให้สมจริง */
        .desk { 
            width: 70px; height: 85px; position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; touch-action: none; z-index: 20;
        }
        .desk:hover { transform: translateY(-5px) scale(1.05); z-index: 30; }
        
        /* เก้าอี้ (พนักพิง) */
        .desk-chair { fill: rgba(255, 255, 255, 0.3); stroke: rgba(255, 255, 255, 0.6); stroke-width: 1.5; rx: 8; transition: all 0.3s; }
        /* โต๊ะ (ไม้) */
        .desk-top { fill: rgba(255, 255, 255, 0.5); stroke: rgba(255, 255, 255, 0.9); stroke-width: 1.5; rx: 6; transition: all 0.3s; }
        /* ร่องใส่ดินสอ */
        .desk-line { stroke: rgba(255, 255, 255, 0.7); stroke-width: 1.5; stroke-linecap: round; }

        /* สถานะถูกจอง (สีแดง/น้ำเงิน) */
        .booked .desk-chair { fill: rgba(239, 68, 68, 0.6); stroke: #ef4444; }
        .booked .desk-top { fill: rgba(248, 113, 113, 0.8); stroke: #fee2e2; }
        .booked:hover { transform: none; cursor: not-allowed; } /* ไม่ให้ขยับตอน Hover ถ้าไม่ใช่สิทธิ์แอดมิน */

        /* สถานะที่นั่งของเรา (สีเขียว) */
        .my-seat .desk-chair { fill: rgba(34, 197, 94, 0.6); stroke: #22c55e; }
        .my-seat .desk-top { fill: rgba(74, 222, 128, 0.9); stroke: #ffffff; filter: drop-shadow(0 0 12px rgba(34, 197, 94, 0.8)); }
        
        .desk-label { 
            position: absolute; top: 38px; width: 100%; text-align: center; font-size: 14px; 
            font-weight: 800; color: #1e293b; pointer-events: none; text-shadow: 0px 0px 4px rgba(255,255,255,0.8); 
        }

        /* Tooltip โต๊ะ */
        .desk-tooltip {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-10px);
            background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; rounded-xl; font-size: 12px;
            white-space: nowrap; border-radius: 8px; opacity: 0; pointer-events: none; transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px);
        }
        .desk:hover .desk-tooltip { opacity: 1; transform: translateX(-50%) translateY(-5px); }

        /* การจัดการ Responsive Map */
        .map-area { 
            border-radius: 2rem; background: rgba(0, 0, 0, 0.15); box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.1); 
            position: relative; overflow: auto; display: flex; justify-content: center;
        }
        
        #roomCanvas { position: relative; width: 900px; height: 800px; transform-origin: top center; transition: transform 0.3s ease; }

        /* สเกลหน้าจอตามอุปกรณ์ */
        @media (max-width: 600px) {
            #roomCanvas { zoom: 0.55; } /* มือถือย่อลงเกือบครึ่ง ให้เห็นชัดๆ */
            .map-area { justify-content: flex-start; }
        }
        @media (min-width: 601px) and (max-width: 1024px) {
            #roomCanvas { zoom: 0.8; } /* แท็บเล็ตย่อเล็กน้อย */
        }

        .animate-in { animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        #g_id_onload, .g_id_signin { background-color: white; border-radius: 999px; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div id="loginPage" class="relative z-10 flex min-h-screen items-center justify-center p-6">
        <div class="glass-panel p-10 w-full max-w-md text-center rounded-[2.5rem] animate-in">
            <div class="w-28 h-28 mx-auto mb-6 relative hover:scale-105 transition-transform">
                <img src="https://upload.wikimedia.org/wikipedia/th/thumb/b/b3/Ntun_logo.png/250px-Ntun_logo.png" alt="Logo" class="relative z-10 w-full h-full object-contain drop-shadow-xl">
            </div>
            <h1 class="text-4xl font-black mb-1 tracking-tight text-white uppercase drop-shadow-md">NTUN SPACE</h1>
            <p class="text-white/90 mb-8 font-light text-sm">ระบบจองที่นั่งออนไลน์พรีเมียม</p>
            
            <div class="bg-white rounded-full p-2 w-fit mx-auto mb-4 shadow-xl hover:shadow-2xl transition-all">
                <div id="g_id_onload" data-client_id="118310489688-8o6l3ogkihci3des8aab8qdd83a7r6gg.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
                <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-theme="outline" data-size="large"></div>
            </div>
            <p class="mt-6 text-[11px] opacity-80 font-medium tracking-wide text-white uppercase">รองรับเฉพาะบัญชี @ntun.ac.th เท่านั้น</p>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col relative z-10">
        
        <header class="p-4 md:p-6 flex flex-col sm:flex-row justify-between items-center gap-4 max-w-7xl mx-auto w-full animate-in">
            <div class="glass-panel px-5 py-2 flex items-center gap-4 rounded-full">
                <div class="w-10 h-10 flex items-center justify-center"><img src="https://upload.wikimedia.org/wikipedia/th/thumb/b/b3/Ntun_logo.png/250px-Ntun_logo.png" class="w-full h-full object-contain drop-shadow-md"></div>
                <div class="text-left">
                    <h1 class="text-white font-bold text-sm md:text-base leading-tight uppercase tracking-widest drop-shadow-sm">NTUN SPACE</h1>
                    <p class="text-white/80 text-[10px] md:text-xs">Premium Seating</p>
                </div>
            </div>

            <div class="glass-panel p-1.5 flex items-center gap-2 rounded-full">
                <button onclick="activeRoomId=null; renderUI()" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2 transition-all">
                    <i class='bx bx-home-alt text-lg'></i> <span class="hidden md:inline">หน้าแรก</span>
                </button>
                <div class="flex items-center gap-2 px-3 border-l border-white/30">
                    <img id="userImg" src="" class="w-8 h-8 rounded-full border-2 border-white/80 shadow-sm">
                    <span id="userName" class="text-white text-sm font-medium hidden md:block drop-shadow-sm"></span>
                </div>
                <button onclick="logout()" class="bg-red-500/80 hover:bg-red-500 text-white px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2 transition-all shadow-sm">
                    <i class='bx bx-log-out text-lg'></i>
                </button>
            </div>
        </header>

        <main class="flex-grow max-w-6xl mx-auto w-full px-4 md:px-6 pb-20">
            <section id="welcomeSection" class="mt-4 mb-8 text-left animate-in" style="animation-delay: 0.1s;">
                <p class="text-white/90 mb-1 font-light tracking-wide">ยินดีต้อนรับกลับมา</p>
                <h2 class="text-3xl md:text-5xl font-bold mb-6 tracking-tight text-white drop-shadow-lg">สวัสดี, <span id="welcomeName">นักเรียน</span></h2>
                
                <div id="dashboardStats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>
            </section>

            <section id="staffAction" class="hidden mb-8 animate-in">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between glass-panel p-4 md:p-5 rounded-[2rem]">
                    <div class="relative flex-1 w-full">
                        <i class='bx bx-search absolute left-5 top-1/2 -translate-y-1/2 text-white/80 text-lg'></i>
                        <input type="text" id="roomSearch" oninput="renderDashboard()" class="w-full bg-black/20 border border-white/30 rounded-full py-3.5 pl-14 pr-6 outline-none text-white placeholder:text-white/70 focus:bg-black/30 transition-all shadow-inner" placeholder="ค้นหาชื่อห้อง หรือ ID...">
                    </div>
                    <button onclick="showCreateModal()" class="bg-white hover:bg-gray-100 text-[#5AB2FF] px-8 py-3.5 w-full md:w-auto rounded-full font-bold transition-all shadow-xl flex items-center justify-center gap-2">
                        <i class='bx bx-plus-circle text-xl'></i> สร้างห้องเรียนใหม่
                    </button>
                </div>
            </section>

            <div id="contentArea"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaTyhtXf-d6qDSD5AeWR33Hg3VCn55o8",
            authDomain: "ntunspace.firebaseapp.com",
            projectId: "ntunspace",
            storageBucket: "ntunspace.firebasestorage.app",
            messagingSenderId: "952526844615",
            appId: "1:952526844615:web:d1f78ba8e3b44c24ee84e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null;
        let activeRoomId = null;
        let classrooms = {};

        function decodeJwt(token) {
            try { return JSON.parse(decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))); } catch (e) { return null; }
        }

        async function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire({ icon: 'error', title: 'ไม่อนุญาต', text: 'เข้าสู่ระบบด้วย @ntun.ac.th เท่านั้น', background: 'rgba(255,255,255,0.95)' });
            currentUser = { email, name: payload.name, role: (email === SUPER_ADMIN) ? 'super_admin' : 'student', picture: payload.picture };
            localStorage.setItem('ntun_session_v13', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v13');
            if (!saved) return;
            currentUser = JSON.parse(saved);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            
            const shortName = currentUser.name.split(' ').slice(0,2).join(' ');
            document.getElementById('userName').innerText = shortName;
            document.getElementById('userImg').src = currentUser.picture;
            if(document.getElementById('welcomeName')) document.getElementById('welcomeName').innerText = shortName;

            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if(isStaff) document.getElementById('staffAction').classList.remove('hidden');

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
                updateStats();
            });
        }

        function logout() { localStorage.removeItem('ntun_session_v13'); location.reload(); }

        function updateStats() {
            if (!['super_admin', 'admin', 'teacher'].includes(currentUser?.role)) {
                document.getElementById('dashboardStats').innerHTML = ''; return;
            }
            let totalR = Object.keys(classrooms).length;
            let totalS = 0; let totalB = 0;
            Object.values(classrooms).forEach(r => {
                totalS += r.seats.length;
                totalB += r.seats.filter(s => s.bookedBy).length;
            });
            
            document.getElementById('dashboardStats').innerHTML = `
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center text-center">
                    <span class="text-white/70 text-xs font-semibold uppercase">ห้องเรียนทั้งหมด</span>
                    <span class="text-2xl font-black text-white">${totalR}</span>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center text-center">
                    <span class="text-white/70 text-xs font-semibold uppercase">ที่นั่งทั้งหมด</span>
                    <span class="text-2xl font-black text-white">${totalS}</span>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center text-center">
                    <span class="text-white/70 text-xs font-semibold uppercase">ถูกจองแล้ว</span>
                    <span class="text-2xl font-black text-red-200">${totalB}</span>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center text-center">
                    <span class="text-white/70 text-xs font-semibold uppercase">เปอร์เซ็นต์จอง</span>
                    <span class="text-2xl font-black text-green-300">${totalS > 0 ? Math.round((totalB/totalS)*100) : 0}%</span>
                </div>
            `;
        }

        function renderUI() {
            if(activeRoomId) {
                document.getElementById('welcomeSection').classList.add('hidden');
                document.getElementById('staffAction')?.classList.add('hidden');
                renderRoomView();
            } else {
                document.getElementById('welcomeSection').classList.remove('hidden');
                if(['super_admin', 'admin', 'teacher'].includes(currentUser.role)) document.getElementById('staffAction').classList.remove('hidden');
                renderDashboard();
            }
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            const query = document.getElementById('roomSearch')?.value.toLowerCase() || '';
            let html = '';
            
            if (isStaff) {
                html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">`;
                for (const id in classrooms) {
                    const room = classrooms[id];
                    if (room.name.toLowerCase().includes(query) || id.toLowerCase().includes(query)) {
                        const booked = room.seats.filter(s => s.bookedBy).length;
                        const percent = (booked/room.seats.length)*100 || 0;
                        html += `
                        <div class="glass-panel p-6 rounded-[2rem] hover:bg-white/[0.2] transition-all flex flex-col group">
                            <div class="flex justify-between items-start mb-3">
                                <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-mono border border-white/30 shadow-sm"><i class='bx bx-hash'></i> ${id}</span>
                                <button onclick="deleteRoom('${id}')" class="text-white/50 hover:text-red-400 bg-black/10 hover:bg-black/20 w-8 h-8 rounded-full flex items-center justify-center transition"><i class='bx bx-trash'></i></button>
                            </div>
                            <h3 class="text-2xl font-bold mb-4 text-white drop-shadow-sm truncate">${room.name}</h3>
                            <div class="flex justify-between text-sm text-white/90 font-medium mb-2">
                                <span>ความจุ</span><span>${booked} / ${room.seats.length}</span>
                            </div>
                            <div class="w-full bg-black/20 rounded-full h-2 mb-6 shadow-inner"><div class="bg-green-400 h-2 rounded-full shadow-[0_0_8px_rgba(74,222,128,0.5)]" style="width: ${percent}%"></div></div>
                            <div class="mt-auto space-y-3">
                                <button onclick="enterRoom('${id}')" class="w-full bg-white text-[#5AB2FF] py-3 rounded-2xl font-bold hover:scale-[1.02] transition-transform shadow-lg">เปิดห้องเรียน</button>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="resetLayout('${id}')" class="bg-black/10 hover:bg-black/20 py-2 rounded-xl text-xs font-medium text-white border border-white/20">จัดผังใหม่</button>
                                    <button onclick="clearAllBookings('${id}')" class="bg-red-500/20 hover:bg-red-500/40 py-2 rounded-xl text-xs font-medium text-red-100 border border-red-300/30">ล้างการจอง</button>
                                </div>
                            </div>
                        </div>`;
                    }
                }
                html += `</div>`;
            } else {
                const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
                if (myRoomId) {
                    const room = classrooms[myRoomId]; const seat = room.seats.find(s => s.bookedBy === currentUser.email);
                    html = `
                    <div class="animate-in glass-panel p-8 md:p-10 rounded-[2.5rem] bg-white/10 relative shadow-2xl overflow-hidden">
                        <div class="absolute -right-10 -top-10 text-[150px] opacity-10 text-white"><i class='bx bxs-check-circle'></i></div>
                        <h2 class="text-3xl font-bold text-white mb-2 relative z-10">${room.name}</h2>
                        <span class="inline-flex bg-green-400 text-green-900 text-sm font-bold px-4 py-1.5 rounded-full items-center gap-1.5 shadow-md mb-6 relative z-10">จองสำเร็จแล้ว</span>
                        <p class="text-white/90 mb-8 text-lg relative z-10">ที่นั่งของคุณคือโต๊ะหมายเลข <span class="font-black text-[#5AB2FF] bg-white px-4 py-1 rounded-xl text-2xl shadow-sm ml-2">#${seat.id}</span></p>
                        <button onclick="enterRoom('${myRoomId}')" class="w-full md:w-auto bg-white/20 hover:bg-white/30 text-white px-8 py-4 rounded-full font-bold transition-all border border-white/40 shadow-lg flex items-center justify-center gap-2 relative z-10"><i class='bx bx-map-alt text-xl'></i> ดูแผนผังที่นั่งในห้อง</button>
                    </div>`;
                } else {
                    html = `
                    <div class="animate-in flex flex-col md:flex-row gap-6">
                        <div class="flex-1 glass-panel p-8 md:p-10 rounded-[2.5rem] relative bg-black/10 shadow-2xl">
                            <h3 class="font-bold text-xl mb-4"><i class='bx bx-door-open'></i> กรอกรหัสเข้าชั้นเรียน</h3>
                            <div class="flex flex-col gap-4">
                                <input id="joinCode" class="w-full bg-black/20 border border-white/40 rounded-2xl px-6 py-5 text-xl font-bold tracking-[0.2em] focus:outline-none focus:bg-black/30 transition-all uppercase placeholder:text-white/50 text-white shadow-inner text-center" placeholder="ใส่ ROOM ID ที่นี่">
                                <button onclick="joinByCode()" class="bg-white text-[#5AB2FF] px-8 py-5 rounded-2xl font-black text-lg hover:scale-[1.02] transition-transform shadow-lg">JOIN ROOM</button>
                            </div>
                        </div>
                    </div>`;
                }
            }
            area.innerHTML = html || `<div class="text-center py-20 glass-panel rounded-3xl"><i class='bx bx-folder-open text-6xl text-white/50 mb-4'></i><p class="text-white/80 font-medium text-lg">ยังไม่มีข้อมูลห้องเรียน</p></div>`;
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            const mySeat = room.seats.find(s => s.bookedBy === currentUser.email);
            
            document.getElementById('contentArea').innerHTML = `
                <div class="glass-panel p-4 md:p-8 rounded-[2.5rem] animate-in flex flex-col items-center relative shadow-2xl">
                    <div class="w-full flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                        <button onclick="activeRoomId=null; renderUI()" class="bg-black/20 hover:bg-black/30 border border-white/30 px-6 py-2.5 rounded-full flex items-center gap-2 font-medium self-start md:self-auto"><i class='bx bx-left-arrow-alt text-xl'></i> กลับ</button>
                        <div class="text-center"><h2 class="text-3xl font-bold drop-shadow-md">${room.name}</h2><p class="text-white/70 text-xs mt-1 uppercase tracking-widest">Room ID: ${activeRoomId}</p></div>
                        <div class="flex gap-2 self-end md:self-auto">
                            ${!isStaff && !mySeat ? `<button onclick="randomSeat()" class="bg-gradient-to-r from-purple-400 to-pink-400 text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-lg hover:opacity-90 flex items-center gap-2"><i class='bx bx-dice-5 text-xl'></i> สุ่มที่นั่ง</button>` : ''}
                            ${isStaff ? `<button onclick="exportExcel()" class="bg-white text-green-600 px-5 py-2.5 rounded-full text-sm font-bold shadow-lg flex items-center gap-2"><i class='bx bxs-file-export text-lg'></i> EXPORT</button>` : ''}
                        </div>
                    </div>

                    <div class="map-area w-full max-w-[1100px] p-6 md:p-10 h-[65vh] md:h-[650px] border border-white/20" id="mapContainer">
                        <div id="roomCanvas">
                            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-16 bg-white/10 rounded-2xl border border-white/20 flex items-center justify-center shadow-sm backdrop-blur-md">
                                <span class="text-sm tracking-[0.4em] text-white/90 font-black uppercase drop-shadow-md"><i class='bx bx-chalkboard'></i> หน้ากระดาน / เวที</span>
                            </div>
                            
                            ${room.seats.map(s => {
                                const isMe = s.bookedBy === currentUser.email;
                                const stateClass = isMe ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                                let label = s.id; let tooltipText = "ว่าง";
                                if (isMe) { label = "ME"; tooltipText = "ที่นั่งของคุณ"; }
                                else if (s.bookedBy && isStaff) { label = s.name.split(' ')[0]; tooltipText = s.name; }
                                else if (s.bookedBy) { label = "FULL"; tooltipText = "ถูกจองแล้ว"; }
                                
                                return `
                                <div id="desk-${s.id}" class="desk ${stateClass}" style="left:${s.x}px; top:${s.y}px;"
                                     onmousedown="startDrag(event, ${s.id})" ontouchstart="startDrag(event, ${s.id})">
                                    <div class="desk-tooltip">${tooltipText}</div>
                                    <svg viewBox="0 0 100 120" class="w-full h-full drop-shadow-md">
                                        <rect x="25" y="85" width="50" height="20" class="desk-chair" />
                                        <line x1="35" y1="75" x2="35" y2="85" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
                                        <line x1="65" y1="75" x2="65" y2="85" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
                                        <rect x="10" y="20" width="80" height="55" class="desk-top" />
                                        <line x1="20" y1="30" x2="80" y2="30" class="desk-line" />
                                    </svg>
                                    <div class="desk-label">${label}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                    
                    <div class="mt-6 flex flex-wrap justify-center gap-4 text-xs font-medium bg-black/20 px-6 py-3 rounded-full border border-white/20">
                        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-white/50 border border-white"></span> ว่าง</div>
                        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-red-400 border border-red-200"></span> ถูกจองแล้ว</div>
                        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-400 border border-green-200 shadow-[0_0_8px_#4ade80]"></span> ที่นั่งของคุณ</div>
                        ${isStaff ? `<div class="flex items-center gap-2 ml-4 text-white/70"><i class='bx bx-move'></i> ลากเพื่อย้ายโต๊ะ</div>` : ''}
                    </div>
                </div>`;
        }

        async function randomSeat() {
            const room = classrooms[activeRoomId];
            const available = room.seats.filter(s => !s.bookedBy);
            if(available.length === 0) return Swal.fire({title: 'เสียใจด้วย!', text: 'ที่นั่งเต็มหมดแล้ว', icon: 'error', background: 'rgba(255,255,255,0.95)'});
            
            Swal.fire({ title: 'กำลังสุ่มที่นั่ง...', allowOutsideClick: false, showConfirmButton: false, background: 'rgba(255,255,255,0.95)', didOpen: () => Swal.showLoading() });
            setTimeout(() => {
                const random = available[Math.floor(Math.random() * available.length)];
                Swal.close();
                handleBooking(random.id, true);
            }, 800);
        }

        async function joinByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (classrooms[code]) enterRoom(code);
            else Swal.fire({ icon: 'warning', title: 'ไม่พบห้อง', text: 'ตรวจสอบรหัสห้องอีกครั้ง', background: 'rgba(255,255,255,0.95)' });
        }

        async function enterRoom(id) {
            const room = classrooms[id]; const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            if (room.password && !isStaff) {
                const { value: pass } = await Swal.fire({ title: 'รหัสผ่านห้อง', input: 'password', showCancelButton: true, background: 'rgba(255,255,255,0.95)' });
                if (pass !== room.password) return pass && Swal.fire({title: 'รหัสผิด', icon: 'error', background: 'rgba(255,255,255,0.95)'});
            }
            activeRoomId = id; renderUI();
        }

        let dragId = null, isMoving = false, startX, startY, initX, initY;
        function startDrag(e, id) {
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);
            dragId = id; isMoving = false;
            const ev = e.touches ? e.touches[0] : e;
            
            // ชดเชยค่า zoom ถ้าย่อจอ
            const zoomLevel = window.innerWidth <= 600 ? 0.55 : (window.innerWidth <= 1024 ? 0.8 : 1);
            startX = ev.clientX / zoomLevel; startY = ev.clientY / zoomLevel;
            
            const el = document.getElementById('desk-'+id);
            initX = parseInt(el.style.left); initY = parseInt(el.style.top);
            
            const moveHandler = (me) => {
                const mev = me.touches ? me.touches[0] : me;
                const dx = (mev.clientX / zoomLevel) - startX; const dy = (mev.clientY / zoomLevel) - startY;
                if((Math.abs(dx) > 5 || Math.abs(dy) > 5) && isStaff) {
                    isMoving = true; el.style.left = (initX + dx)+'px'; el.style.top = (initY + dy)+'px';
                }
            };
            const endHandler = () => {
                document.removeEventListener('mousemove', moveHandler); document.removeEventListener('mouseup', endHandler);
                document.removeEventListener('touchmove', moveHandler); document.removeEventListener('touchend', endHandler);
                if(isMoving && isStaff) {
                    const room = classrooms[activeRoomId]; const seat = room.seats.find(s => s.id === dragId);
                    seat.x = parseInt(el.style.left); seat.y = parseInt(el.style.top);
                    db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats });
                } else if (!isMoving) { handleBooking(dragId); }
                dragId = null;
            };
            document.addEventListener('mousemove', moveHandler); document.addEventListener('mouseup', endHandler);
            document.addEventListener('touchmove', moveHandler, { passive: false }); document.addEventListener('touchend', endHandler);
        }

        async function handleBooking(sid, skipConfirm = false) {
            const room = classrooms[activeRoomId]; const seat = room.seats.find(s => s.id === sid);
            const isStaff = ['super_admin', 'admin', 'teacher'].includes(currentUser.role);

            if (seat.bookedBy) {
                if (seat.bookedBy === currentUser.email || isStaff) {
                    const res = await Swal.fire({ title: 'ยกเลิกการจอง?', text: `ยกเลิกที่นั่งโต๊ะ ${sid}`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: 'rgba(255,255,255,0.95)' });
                    if(res.isConfirmed) { seat.bookedBy = null; seat.name = null; db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats }); }
                } return;
            }

            if (!isStaff) {
                for (const rId in classrooms) {
                    if (classrooms[rId].seats.some(s => s.bookedBy === currentUser.email)) return Swal.fire({ icon: 'error', title: 'ไม่อนุญาต', text: 'คุณมีที่นั่งในระบบอยู่แล้ว', background: 'rgba(255,255,255,0.95)' });
                }
            }

            if(!skipConfirm) {
                const conf = await Swal.fire({ title: `ยืนยันจองโต๊ะ #${sid}?`, icon: 'question', showCancelButton: true, confirmButtonColor: '#22c55e', background: 'rgba(255,255,255,0.95)'});
                if(!conf.isConfirmed) return;
            }

            seat.bookedBy = currentUser.email; seat.name = currentUser.name;
            db.collection("classrooms").doc(activeRoomId).update({ seats: room.seats }).then(() => {
                if(skipConfirm) Swal.fire({ title: `ได้โต๊ะ #${sid}!`, icon: 'success', timer: 1500, showConfirmButton: false, background: 'rgba(255,255,255,0.95)'});
            });
        }

        function showCreateModal() {
            Swal.fire({
                title: 'สร้างห้องเรียนใหม่', background: 'rgba(255,255,255,0.95)',
                html: `<div class="text-left space-y-4 p-2 text-slate-700">
                    <label class="font-bold text-sm">ชื่อห้องเรียน</label><input id="swal-name" class="w-full bg-slate-100 border border-slate-200 p-3 rounded-xl focus:outline-[#5AB2FF]" placeholder="เช่น ห้อง 5/1">
                    <label class="font-bold text-sm">จำนวนที่นั่ง</label><input id="swal-count" type="number" class="w-full bg-slate-100 border border-slate-200 p-3 rounded-xl focus:outline-[#5AB2FF]" placeholder="เช่น 40">
                    <label class="font-bold text-sm">รหัสผ่าน (เว้นว่างได้)</label><input id="swal-pass" class="w-full bg-slate-100 border border-slate-200 p-3 rounded-xl focus:outline-[#5AB2FF]">
                </div>`,
                showCancelButton: true, confirmButtonText: 'สร้างห้อง', confirmButtonColor: '#5AB2FF',
                preConfirm: () => {
                    const name = document.getElementById('swal-name').value; const count = document.getElementById('swal-count').value;
                    if (!name || !count) return Swal.showValidationMessage('กรอกข้อมูลให้ครบถ้วน');
                    return [name, count, document.getElementById('swal-pass').value];
                }
            }).then(res => {
                if(res.isConfirmed) {
                    const [name, count, pass] = res.value; const id = Math.random().toString(36).substring(2, 8).toUpperCase();
                    const seats = [];
                    for(let i=0; i<parseInt(count); i++) {
                        const col = i % 8; const row = Math.floor(i / 8);
                        let xOffset = (col >= 3 ? 50 : 0) + (col >= 5 ? 50 : 0); // แบ่งโซนทางเดิน 2 ช่อง
                        seats.push({ id: i+1, x: (col * 90) + 70 + xOffset, y: (row * 120) + 120, bookedBy: null, name: null });
                    }
                    db.collection("classrooms").doc(id).set({ name, seats, password: pass || null });
                    Swal.fire({ title: 'สำเร็จ', text: `รหัสห้อง: ${id}`, icon: 'success', background: 'rgba(255,255,255,0.95)' });
                }
            });
        }

        async function resetLayout(roomId) {
            const room = classrooms[roomId];
            const updatedSeats = room.seats.map((seat, i) => {
                const col = i % 8; const row = Math.floor(i / 8);
                let xOffset = (col >= 3 ? 50 : 0) + (col >= 5 ? 50 : 0);
                return { ...seat, x: (col * 90) + 70 + xOffset, y: (row * 120) + 120 };
            });
            await db.collection("classrooms").doc(roomId).update({ seats: updatedSeats });
            Swal.fire({ title: 'จัดผังใหม่สำเร็จ', icon: 'success', timer: 1000, showConfirmButton:false, background: 'rgba(255,255,255,0.95)' });
        }

        async function clearAllBookings(roomId) {
            const res = await Swal.fire({ title: 'ล้างการจองทั้งหมด?', text: "ข้อมูลผู้จองจะหายไป แต่ผังที่นั่งยังอยู่เหมือนเดิม", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: 'rgba(255,255,255,0.95)' });
            if (res.isConfirmed) {
                const clearedSeats = classrooms[roomId].seats.map(s => ({ ...s, bookedBy: null, name: null }));
                await db.collection("classrooms").doc(roomId).update({ seats: clearedSeats });
            }
        }

        function exportExcel() {
            const room = classrooms[activeRoomId];
            const data = room.seats.filter(s => s.bookedBy).map(s => ({ "เลขที่นั่ง": s.id, "ชื่อ": s.name, "อีเมล": s.bookedBy, "ห้อง": room.name }));
            if (!data.length) return Swal.fire({title: 'ว่างเปล่า', text: 'ยังไม่มีคนจอง', icon: 'info', background: 'rgba(255,255,255,0.95)'});
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "รายชื่อ");
            XLSX.writeFile(wb, `Seats_${room.name}.xlsx`);
        }

        async function deleteRoom(id) {
            const res = await Swal.fire({ title: 'ลบห้องเรียนทิ้ง?', text: "ไม่สามารถกู้คืนได้", icon: 'error', showCancelButton: true, confirmButtonColor: '#ef4444', background: 'rgba(255,255,255,0.95)' });
            if(res.isConfirmed) await db.collection("classrooms").doc(id).delete();
        }

        window.onload = initApp;
    </script>
</body>
</html>
