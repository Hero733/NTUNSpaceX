<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - Premium Seating</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(180deg, #87CEEB 0%, #7B68EE 50%, #FF69B4 100%);
            background-attachment: fixed;
            min-height: 100vh; color: white; overflow-x: hidden; margin: 0;
        }

        .cloud-bg {
            position: fixed;
            bottom: -30px; left: 0; width: 100%; height: 150px;
            background: url('https://www.transparenttextures.com/patterns/clouds.png');
            filter: brightness(0) invert(1) opacity(0.5);
            z-index: 1; pointer-events: none;
        }

        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px) saturate(180%); 
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-pill { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 999px;
        }

        /* Responsive Seat Design */
        .desk { width: 60px; height: 75px; position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .desk-part { fill: rgba(255, 255, 255, 0.7); stroke: white; stroke-width: 1.5; }
        .chair-part { fill: rgba(255, 255, 255, 0.4); stroke: white; stroke-width: 1.5; }
        .booked .desk-part { fill: #818cf8; }
        .my-seat .desk-part { fill: #22c55e; filter: drop-shadow(0 0 8px #22c55e); }
        .desk-label { position: absolute; top: 22px; width: 100%; text-align: center; font-size: 10px; font-weight: 800; color: #334155; }

        /* Progress Bar */
        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.2); border-radius: 99px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: #22c55e; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }

        /* Smooth Animation */
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Optimization */
        @media (max-width: 640px) {
            .login-card { padding: 2.5rem 1.5rem !important; border-radius: 2.5rem !important; }
            .header-content { flex-direction: column; text-align: center; gap: 1rem; }
            h1 { font-size: 2.5rem !important; }
            .map-container { overflow-x: auto; padding-bottom: 20px; }
            .map-inner { transform: scale(0.85); transform-origin: top left; }
        }
    </style>
</head>
<body>

    <div class="cloud-bg"></div>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="glass login-card p-10 w-full max-w-sm text-center rounded-[3rem] animate-in">
            <div class="w-24 h-24 mx-auto mb-6 bg-white rounded-full p-4 shadow-lg">
                <img src="photo/logo.png" alt="Logo" class="w-full h-full object-contain">
            </div>
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-white drop-shadow-md">ลงทะเบียนชุมนุม</h1>
                <p class="text-white/80 mt-1 text-xs">นวมินทราชินูทิศ เตรียมอุดมศึกษาน้อมเกล้า</p>
            </div>
            <div id="g_id_onload" data-client_id="YOUR_CLIENT_ID" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
            <p class="mt-8 text-[10px] font-bold opacity-60 tracking-widest uppercase">@ntun.ac.th only</p>
        </div>
    </div>

    <div id="mainApp" class="hidden relative z-10">
        <header class="p-6 md:p-8 max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="glass-pill p-2"><img src="photo/logo.png" class="w-10 h-10 object-contain"></div>
                <h2 class="text-xl font-bold tracking-tight uppercase">NTUN SPACE</h2>
            </div>
            <div class="flex items-center gap-3">
                <div class="glass-pill px-4 py-1.5 flex items-center gap-3">
                    <img id="userImg" class="w-8 h-8 rounded-full border border-white/50">
                    <span id="userName" class="text-xs font-bold truncate max-w-[100px]"></span>
                </div>
                <button onclick="logout()" class="bg-red-500/80 px-5 py-2 rounded-full text-xs font-bold">ออกระบบ</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-20">
            <section id="studentAction" class="mt-8 animate-in">
                <h1 class="text-4xl md:text-6xl font-bold mb-8 drop-shadow-lg">สวัสดี, <span id="welcomeName"></span></h1>
                
                <div id="bookingStatus"></div>

                <div id="joinBox" class="glass p-8 rounded-[2.5rem] max-w-xl border-white/40 mt-6">
                    <p class="mb-4 font-bold text-sm flex items-center gap-2"><i class='bx bx-door-open'></i> ระบุรหัสชั้นเรียน</p>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input id="joinCode" class="flex-1 glass bg-white/20 px-6 py-4 rounded-2xl text-xl font-bold uppercase outline-none" placeholder="ROOM ID">
                        <button onclick="joinByCode()" class="bg-white text-indigo-600 px-8 py-4 rounded-2xl font-black shadow-lg">JOIN</button>
                    </div>
                </div>
            </section>

            <section id="staffAction" class="hidden mt-8 animate-in">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold">คลังห้องเรียน</h2>
                    <button onclick="showCreateModal()" class="bg-white text-indigo-600 px-6 py-2 rounded-full font-bold shadow-lg">+ สร้างห้อง</button>
                </div>
                <div id="roomGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <div id="contentArea" class="mt-10"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = { /* ใส่ข้อมูล Firebase ของคุณที่นี่ */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null, activeRoomId = null, classrooms = {};

        function getUsername(email) { return email.split('@')[0]; }

        async function handleGoogleLogin(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const email = payload.email.toLowerCase();
            if (!email.endsWith('@ntun.ac.th')) return Swal.fire('ใช้ @ntun.ac.th เท่านั้น', '', 'error');
            
            currentUser = { 
                email, 
                name: getUsername(email), 
                picture: payload.picture, 
                role: (email === SUPER_ADMIN ? 'admin' : 'student') 
            };
            localStorage.setItem('ntun_session_v3', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v3');
            if (!saved) return;
            currentUser = JSON.parse(saved);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;
            document.getElementById('welcomeName').innerText = currentUser.name;

            if(currentUser.role === 'admin') {
                document.getElementById('staffAction').classList.remove('hidden');
                document.getElementById('joinBox').classList.add('hidden');
            }

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function renderUI() {
            if (activeRoomId) renderRoomView();
            else if (currentUser.role === 'admin') renderAdminGrid();
            else renderStudentStatus();
        }

        function renderAdminGrid() {
            const grid = document.getElementById('roomGrid');
            grid.innerHTML = Object.entries(classrooms).map(([id, room]) => {
                const booked = room.seats.filter(s => s.bookedBy).length;
                const total = room.seats.length;
                const percent = (booked / total) * 100;
                return `
                <div class="glass p-6 rounded-[2rem] cursor-pointer hover:bg-white/30 transition-all" onclick="enterRoom('${id}')">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-bold bg-white/20 px-2 py-1 rounded-md">${id}</span>
                        <i class='bx bx-trash opacity-40' onclick="event.stopPropagation(); deleteRoom('${id}')"></i>
                    </div>
                    <h3 class="text-xl font-bold">${room.name}</h3>
                    <p class="text-xs opacity-70 mt-1">จองแล้ว: ${booked}/${total}</p>
                    <div class="progress-container"><div class="progress-fill" style="width:${percent}%"></div></div>
                </div>`;
            }).join('');
        }

        function renderStudentStatus() {
            const area = document.getElementById('bookingStatus');
            const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
            if (myRoomId) {
                const room = classrooms[myRoomId];
                const seat = room.seats.find(s => s.bookedBy === currentUser.email);
                area.innerHTML = `
                <div class="glass p-8 rounded-[2.5rem] max-w-xl animate-in">
                    <span class="bg-green-500 text-[10px] font-bold px-3 py-1 rounded-full">ลงทะเบียนสำเร็จ</span>
                    <h2 class="text-3xl font-bold mt-4">${room.name}</h2>
                    <p class="text-lg opacity-80">ที่นั่งของคุณ: <span class="text-2xl font-black text-indigo-200">${seat.id}</span></p>
                    <button onclick="enterRoom('${myRoomId}')" class="w-full mt-6 bg-white text-indigo-600 py-4 rounded-2xl font-bold">ดูตำแหน่งที่นั่ง</button>
                </div>`;
                document.getElementById('joinBox').classList.add('hidden');
            } else {
                area.innerHTML = "";
                document.getElementById('joinBox').classList.remove('hidden');
            }
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            document.getElementById('contentArea').innerHTML = `
                <div class="flex justify-between items-center mb-6 animate-in">
                    <button onclick="activeRoomId=null; renderUI()" class="glass-pill px-5 py-2 text-sm font-bold">< ย้อนกลับ</button>
                    <h2 class="text-xl font-bold">${room.name}</h2>
                </div>
                <div class="map-container glass rounded-[3rem] p-4 md:p-10">
                    <div class="map-inner w-[900px] h-[650px] relative mx-auto">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[300px] h-2 bg-white/30 rounded-full"></div>
                        <p class="absolute top-4 left-1/2 -translate-x-1/2 text-[9px] font-bold opacity-50 tracking-widest">FRONT</p>
                        ${room.seats.map(s => {
                            const isMe = s.bookedBy === currentUser.email;
                            const state = isMe ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            return `
                            <div class="desk ${state}" style="left:${s.x}px; top:${s.y}px;" onclick="handleBooking('${s.id}')">
                                <svg viewBox="0 0 100 120"><path d="M25,80 L75,80 L70,110 L30,110 Z" class="chair-part"/><rect x="5" y="10" width="90" height="60" rx="8" class="desk-part"/></svg>
                                <div class="desk-label">${isMe ? 'ME' : (s.bookedBy ? 'FULL' : s.id)}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        async function joinByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (classrooms[code]) enterRoom(code);
            else Swal.fire('ไม่พบรหัสห้อง', '', 'warning');
        }

        function enterRoom(id) { activeRoomId = id; renderUI(); }
        function logout() { localStorage.removeItem('ntun_session_v3'); location.reload(); }
        window.onload = initApp;
    </script>
</body>
</html>
