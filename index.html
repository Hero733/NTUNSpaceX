<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTUN Space - Premium Seating</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.25); --glass-border: rgba(255, 255, 255, 0.4); }
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(180deg, #87CEEB 0%, #7B68EE 50%, #FF69B4 100%);
            background-attachment: fixed; min-height: 100vh; color: white; overflow-x: hidden; margin: 0;
        }
        .cloud-bg { position: fixed; bottom: -30px; left: 0; width: 100%; height: 180px; background: url('https://www.transparenttextures.com/patterns/clouds.png'); filter: brightness(0) invert(1) opacity(0.5); z-index: 1; pointer-events: none; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(25px) saturate(180%); border: 1px solid var(--glass-border); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); }
        .glass-pill { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 999px; }
        .progress-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.2); border-radius: 999px; margin-top: 12px; overflow: hidden; }
        .progress-bar { height: 100%; background: #22c55e; transition: width 0.6s ease; }
        
        /* Seat Design */
        .desk { width: 65px; height: 80px; position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .desk-part { fill: rgba(255, 255, 255, 0.7); stroke: white; stroke-width: 1.5; }
        .chair-part { fill: rgba(255, 255, 255, 0.4); stroke: white; stroke-width: 1.5; }
        .booked .desk-part { fill: #818cf8; }
        .my-seat .desk-part { fill: #22c55e; filter: drop-shadow(0 0 10px #22c55e); }
        .desk-label { position: absolute; top: 24px; width: 100%; text-align: center; font-size: 10px; font-weight: 800; color: #334155; pointer-events: none; }

        .animate-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 640px) { .map-container { overflow-x: auto; } .map-inner { transform: scale(0.8); transform-origin: top left; } }
    </style>
</head>
<body>

    <div class="cloud-bg"></div>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="glass p-10 w-full max-w-sm text-center rounded-[3.5rem] animate-in">
            <div class="w-24 h-24 mx-auto mb-6 bg-white rounded-full p-4 shadow-xl">
                <img src="photo/logo.png" alt="Logo" class="w-full h-full object-contain">
            </div>
            <div class="mb-10 text-white">
                <span class="glass-pill px-4 py-1 text-[10px] font-bold tracking-widest uppercase">NTUNISO · OCRS</span>
                <h1 class="text-3xl font-bold mt-4 drop-shadow-md">ระบบลงทะเบียน</h1>
                <p class="text-white/80 mt-1 text-xs">นวมินทราชินูทิศ เตรียมอุดมศึกษาน้อมเกล้า</p>
            </div>
            <div id="g_id_onload" 
                 data-client_id="118310489688-8o6l3ogkihci3des8aab8qdd83a7r6gg.apps.googleusercontent.com" 
                 data-callback="handleGoogleLogin">
            </div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <div id="mainApp" class="hidden relative z-10">
        <header class="p-6 md:p-8 flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="glass-pill p-2"><img src="photo/logo.png" class="w-10 h-10 object-contain"></div>
                <h2 class="text-xl font-bold uppercase hidden sm:block">NTUN Space</h2>
            </div>
            <div class="flex items-center gap-3">
                <div class="glass-pill px-4 py-1.5 flex items-center gap-3">
                    <img id="userImg" class="w-8 h-8 rounded-full border border-white/50">
                    <span id="userName" class="text-xs font-bold truncate max-w-[120px]"></span>
                </div>
                <button onclick="logout()" class="bg-red-500/80 px-5 py-2 rounded-full text-xs font-bold shadow-lg">ออกระบบ</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-20">
            <section id="studentAction" class="mt-8 animate-in">
                <p class="opacity-90 font-medium mb-1">ยินดีต้อนรับกลับมา</p>
                <h1 class="text-5xl md:text-6xl font-bold mb-10 drop-shadow-lg">สวัสดี, <span id="welcomeName"></span></h1>
                
                <div id="bookingStatus"></div>

                <div id="joinBox" class="glass p-8 rounded-[3rem] max-w-2xl border-white/40 mt-6">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><i class='bx bx-door-open text-2xl'></i> กรอกรหัสชั้นเรียน</h3>
                    <div class="flex flex-col sm:flex-row gap-4">
                        <input id="joinCode" class="flex-1 glass bg-white/20 px-6 py-4 rounded-2xl text-xl font-bold tracking-widest uppercase outline-none placeholder:text-white/40" placeholder="ROOM ID">
                        <button onclick="joinByCode()" class="bg-white text-indigo-600 px-10 py-4 rounded-2xl font-black text-lg shadow-xl hover:scale-105 active:scale-95 transition-all">JOIN</button>
                    </div>
                </div>
            </section>

            <section id="staffAction" class="hidden mt-8 animate-in">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-bold drop-shadow-md">คลังห้องเรียน</h2>
                    <button onclick="showCreateModal()" class="bg-white text-indigo-600 px-8 py-2 rounded-full font-bold shadow-lg">+ สร้างห้อง</button>
                </div>
                <div id="roomGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <div id="contentArea" class="mt-10"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SUPER_ADMIN = "ntun21933@ntun.ac.th";
        let currentUser = null, activeRoomId = null, classrooms = {};

        function parseJwt(token) {
            try {
                return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            } catch (e) { return null; }
        }

        async function handleGoogleLogin(response) {
            const payload = parseJwt(response.credential);
            const email = payload.email.toLowerCase();
            
            if (!email.endsWith('@ntun.ac.th')) {
                return Swal.fire('ผิดพลาด', 'กรุณาใช้เมล @ntun.ac.th', 'error');
            }
            
            currentUser = { 
                email, 
                name: payload.name, 
                picture: payload.picture, 
                role: (email === SUPER_ADMIN ? 'admin' : 'student') 
            };
            localStorage.setItem('ntun_session_v4', JSON.stringify(currentUser));
            initApp();
        }

        function initApp() {
            const saved = localStorage.getItem('ntun_session_v4');
            if (!saved) return;
            currentUser = JSON.parse(saved);
            
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userImg').src = currentUser.picture;
            document.getElementById('welcomeName').innerText = currentUser.name.split(' ')[0];

            if(currentUser.role === 'admin') document.getElementById('staffAction').classList.remove('hidden');

            db.collection("classrooms").onSnapshot(snap => {
                classrooms = {};
                snap.forEach(doc => { classrooms[doc.id] = doc.data(); });
                renderUI();
            });
        }

        function renderUI() {
            if (activeRoomId) renderRoomView();
            else if (currentUser.role === 'admin') renderAdminGrid();
            else renderStudentStatus();
        }

        function renderAdminGrid() {
            const grid = document.getElementById('roomGrid');
            grid.innerHTML = Object.entries(classrooms).map(([id, room]) => {
                const booked = room.seats.filter(s => s.bookedBy).length;
                const total = room.seats.length;
                const percent = (booked / total) * 100;
                return `
                <div class="glass p-8 rounded-[2.5rem] cursor-pointer hover:bg-white/30 transition-all animate-in" onclick="enterRoom('${id}')">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-bold bg-white/30 px-3 py-1 rounded-full">${id}</span>
                        <i class='bx bx-trash text-xl opacity-40 hover:text-red-500' onclick="event.stopPropagation(); deleteRoom('${id}')"></i>
                    </div>
                    <h3 class="text-2xl font-bold">${room.name}</h3>
                    <p class="text-sm opacity-80 mt-2 font-medium">จองแล้ว: ${booked} / ${total}</p>
                    <div class="progress-container"><div class="progress-bar" style="width: ${percent}%"></div></div>
                </div>`;
            }).join('');
        }

        function renderStudentStatus() {
            const area = document.getElementById('bookingStatus');
            const myRoomId = Object.keys(classrooms).find(id => classrooms[id].seats.some(s => s.bookedBy === currentUser.email));
            
            if (myRoomId) {
                const seat = classrooms[myRoomId].seats.find(s => s.bookedBy === currentUser.email);
                area.innerHTML = `
                <div class="glass p-10 rounded-[3rem] max-w-xl animate-in border-white/60">
                    <span class="bg-green-500 text-[10px] font-bold px-4 py-1 rounded-full shadow-lg">ลงทะเบียนสำเร็จ</span>
                    <h2 class="text-4xl font-bold mt-6">${classrooms[myRoomId].name}</h2>
                    <p class="text-xl opacity-90 mt-2">หมายเลขที่นั่ง: <span class="text-3xl font-black text-indigo-200 underline">${seat.id}</span></p>
                    <button onclick="enterRoom('${myRoomId}')" class="w-full mt-10 bg-white text-indigo-600 py-5 rounded-3xl font-bold shadow-xl">ดูตำแหน่งบนแผนที่</button>
                </div>`;
                document.getElementById('joinBox').classList.add('hidden');
            } else {
                area.innerHTML = "";
                document.getElementById('joinBox').classList.remove('hidden');
            }
        }

        function renderRoomView() {
            const room = classrooms[activeRoomId];
            document.getElementById('studentAction').classList.add('hidden');
            document.getElementById('staffAction').classList.add('hidden');
            
            document.getElementById('contentArea').innerHTML = `
                <div class="flex justify-between items-center mb-8 animate-in">
                    <button onclick="exitRoom()" class="glass-pill px-6 py-2.5 font-bold">< ย้อนกลับ</button>
                    <h2 class="text-2xl font-bold drop-shadow-md">${room.name}</h2>
                </div>
                <div class="map-container glass rounded-[4rem] p-6 md:p-12 border-white/30 overflow-hidden">
                    <div class="map-inner w-[950px] h-[750px] mx-auto relative">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[400px] h-3 bg-white/40 rounded-full blur-[1px]"></div>
                        <p class="absolute top-6 left-1/2 -translate-x-1/2 text-[10px] font-black opacity-50 uppercase tracking-[0.5em]">FRONT OF CLASS</p>
                        ${room.seats.map(s => {
                            const isMe = s.bookedBy === currentUser.email;
                            const state = isMe ? 'my-seat' : (s.bookedBy ? 'booked' : '');
                            return `
                            <div class="desk ${state}" style="left:${s.x}px; top:${s.y}px;" onclick="handleBooking('${s.id}')">
                                <svg viewBox="0 0 100 120" class="drop-shadow-lg">
                                    <path d="M25,80 L75,80 L70,110 L30,110 Z" class="chair-part" />
                                    <rect x="5" y="10" width="90" height="60" rx="8" class="desk-part" />
                                </svg>
                                <div class="desk-label">${isMe ? 'ME' : (s.bookedBy ? 'FULL' : s.id)}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        async function handleBooking(seatId) {
            const room = classrooms[activeRoomId];
            const seat = room.seats.find(s => s.id === seatId);

            if (seat.bookedBy && seat.bookedBy !== currentUser.email) return Swal.fire('ที่นั่งไม่ว่าง', '', 'warning');

            if (seat.bookedBy === currentUser.email) {
                const res = await Swal.fire({ title: 'ยกเลิกการจอง?', icon: 'question', showCancelButton: true });
                if (res.isConfirmed) {
                    const newSeats = room.seats.map(s => s.id === seatId ? {...s, bookedBy: null} : s);
                    await db.collection("classrooms").doc(activeRoomId).update({ seats: newSeats });
                }
                return;
            }

            const alreadyBooked = Object.values(classrooms).some(r => r.seats.some(s => s.bookedBy === currentUser.email));
            if (alreadyBooked) return Swal.fire('คุณมีการจองที่นั่งอยู่แล้ว', '', 'error');

            const confirm = await Swal.fire({ title: `จองที่นั่ง ${seatId}?`, icon: 'info', showCancelButton: true });
            if (confirm.isConfirmed) {
                const newSeats = room.seats.map(s => s.id === seatId ? {...s, bookedBy: currentUser.email} : s);
                await db.collection("classrooms").doc(activeRoomId).update({ seats: newSeats });
                Swal.fire('สำเร็จ!', '', 'success');
            }
        }

        async function showCreateModal() {
            const { value: v } = await Swal.fire({
                title: 'สร้างห้องเรียน',
                html: '<input id="id" class="swal2-input" placeholder="ID (เช่น M61)">' +
                     '<input id="n" class="swal2-input" placeholder="ชื่อห้อง">' +
                     '<div class="flex gap-2 p-4"><input id="r" type="number" class="swal2-input" placeholder="แถว"> <input id="c" type="number" class="swal2-input" placeholder="หลัก"></div>',
                preConfirm: () => ({ id: document.getElementById('id').value.toUpperCase(), name: document.getElementById('n').value, rows: document.getElementById('r').value, cols: document.getElementById('c').value })
            });

            if (v && v.id) {
                const seats = [];
                for(let i=0; i<v.rows; i++) {
                    for(let j=0; j<v.cols; j++) {
                        seats.push({ id: `${String.fromCharCode(65+i)}${j+1}`, x: j*120+50, y: i*130+80, bookedBy: null });
                    }
                }
                await db.collection("classrooms").doc(v.id).set({ name: v.name, seats });
            }
        }

        function enterRoom(id) { activeRoomId = id; renderUI(); }
        function exitRoom() { 
            activeRoomId = null; 
            document.getElementById('contentArea').innerHTML = "";
            document.getElementById('studentAction').classList.remove('hidden');
            if(currentUser.role === 'admin') document.getElementById('staffAction').classList.remove('hidden');
            renderUI();
        }
        function joinByCode() {
            const code = document.getElementById('joinCode').value.toUpperCase();
            if(classrooms[code]) enterRoom(code); else Swal.fire('ไม่พบห้อง', '', 'error');
        }
        function logout() { localStorage.removeItem('ntun_session_v4'); location.reload(); }
        async function deleteRoom(id) {
            if((await Swal.fire({title:'ลบห้อง?', showCancelButton:true})).isConfirmed) db.collection("classrooms").doc(id).delete();
        }
        window.onload = initApp;
    </script>
</body>
</html>
